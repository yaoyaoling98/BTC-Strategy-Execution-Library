<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC Signal v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── Design Tokens ─────────────────────────────────────────── */
:root {
    --bg-primary:    #0a0a0a;
    --bg-elevated:   #131722;
    --bg-hover:      #1e222d;
    --border-subtle: #1e222d;
    --border-default:#2a2e39;
    --text-primary:  #d1d4dc;
    --text-secondary:#787b86;
    --text-muted:    #4a4f5e;
    --accent:        #2962ff;
    --green:         #26a69a;
    --red:           #ef5350;
    --yellow:        #ffb74d;
    --font-ui:  'Inter', system-ui, -apple-system, sans-serif;
    --font-mono:'JetBrains Mono','SF Mono','Fira Code','Consolas',monospace;
    --r: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 13px; }
body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-ui);
    line-height: 1.5;
    min-height: 100vh;
}
button { cursor: pointer; font-family: inherit; }
input  { font-family: inherit; }
.mono  { font-family: var(--font-mono); font-feature-settings: "tnum" 1; }

/* ── Number flash (only animation allowed) ────────────────── */
@keyframes numFlash { 0%{opacity:.25} 100%{opacity:1} }
.flashing { animation: numFlash .2s ease-out; }

/* ── Header (48px) ────────────────────────────────────────── */
header {
    height: 48px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--border-default);
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 16px;
    position: sticky; top: 0; z-index: 100;
}
.hdr-l { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.logo   { font-weight: 600; font-size: 14px; color: var(--text-primary); letter-spacing: .5px; }
.logo em { color: var(--accent); font-style: normal; }
.pair-meta { font-size: 11px; color: var(--text-muted); letter-spacing: .5px; }

.hdr-c { display: flex; align-items: center; gap: 10px; flex: 1; justify-content: center; }
#tb-price {
    font-family: var(--font-mono);
    font-feature-settings: "tnum" 1;
    font-size: 22px; font-weight: 600;
    color: var(--text-primary);
}
.chg-badge {
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 4px;
    background: var(--bg-hover);
    color: var(--text-muted);
}
.chg-badge.up   { background: rgba(38,166,154,.15); color: var(--green); }
.chg-badge.down { background: rgba(239,83,80,.12);  color: var(--red);   }

.hdr-r { display: flex; align-items: center; gap: 12px; flex-shrink: 0; margin-left: auto; }
.hdr-countdown { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.news-toggle-wrap { display: flex; align-items: center; gap: 5px; cursor: pointer; }
.news-toggle-wrap input { width: 0; height: 0; opacity: 0; position: absolute; }
#newsLabel {
    font-size: 11px; font-weight: 500; padding: 3px 8px;
    border: 1px solid var(--border-default);
    border-radius: var(--r); color: var(--text-muted);
    letter-spacing: .5px; transition: .15s;
}
#newsLabel.active { border-color: var(--yellow); color: var(--yellow); }
.hdr-btn {
    font-size: 11px; font-weight: 500;
    padding: 4px 10px;
    background: transparent;
    border: 1px solid var(--border-default);
    border-radius: var(--r);
    color: var(--text-secondary);
    letter-spacing: .5px;
    transition: .15s;
}
.hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ── News banner ──────────────────────────────────────────── */
#newsBanner {
    display: none;
    background: rgba(255,183,77,.06);
    border-bottom: 1px solid rgba(255,183,77,.2);
    padding: 7px 16px;
    font-size: 11px; letter-spacing: .8px; color: var(--yellow);
    text-align: center;
}

/* ── Layout grid ──────────────────────────────────────────── */
.layout {
    display: grid;
    grid-template-columns: 256px 1fr 292px;
    grid-template-areas: "indicators signal history";
    gap: 12px;
    padding: 12px 16px;
    align-items: start;
}
@media (max-width: 1279px) {
    .layout {
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
            "signal signal"
            "indicators history";
    }
}
@media (max-width: 767px) {
    .layout {
        grid-template-columns: 1fr;
        grid-template-areas: "signal" "indicators" "history";
    }
}
.col-indicators { grid-area: indicators; }
.col-signal     { grid-area: signal; }
.col-history    { grid-area: history; }

/* ── Panel base ───────────────────────────────────────────── */
.panel {
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    border-radius: var(--r);
    overflow: hidden;
}
.panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 11px; font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* ── Signal card ──────────────────────────────────────────── */
.sig-body { padding: 20px 20px 16px; }

#sigStatus {
    font-family: var(--font-ui);
    font-size: 28px; font-weight: 600;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 12px;
}
#sigStatus.buy  { color: var(--green); font-size: 32px; }
#sigStatus.sell { color: var(--red);   font-size: 32px; }
#sigStatus.blocked { color: var(--yellow); font-size: 20px; }

.sig-sub {
    font-size: 11px; font-weight: 500; letter-spacing: 1px;
    color: var(--text-secondary); margin-bottom: 16px;
    text-transform: uppercase;
}

/* Score progress bar (WAITING state) */
.score-bar-wrap {
    height: 3px; background: var(--border-default);
    border-radius: 2px; margin-bottom: 8px;
    overflow: hidden;
}
.score-bar-fill {
    height: 100%; border-radius: 2px;
    background: var(--accent);
    transition: width .3s;
}
.score-legend {
    font-family: var(--font-mono); font-size: 11px;
    color: var(--text-muted);
}

/* Entry decision table */
.entry-tbl {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0;
    margin-top: 16px;
    border: 1px solid var(--border-default);
    border-radius: var(--r);
    overflow: hidden;
}
.entry-tbl .et-row {
    display: contents;
}
.entry-tbl .et-label,
.entry-tbl .et-val {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 12px;
}
.entry-tbl .et-row:last-child .et-label,
.entry-tbl .et-row:last-child .et-val { border-bottom: none; }
.et-label { color: var(--text-muted); font-size: 11px; letter-spacing: .5px; text-transform: uppercase; }
.et-val   { font-family: var(--font-mono); font-feature-settings:"tnum" 1; font-weight: 600; color: var(--text-primary); }
.et-val.tp { color: var(--green); }
.et-val.sl { color: var(--red); }
.et-val.rr { color: var(--accent); }
.et-val.wr { color: var(--yellow); }
.entry-tbl .et-full { grid-column: 1 / -1; }

/* Signal card border states */
.panel.sig-state-buy     { border-color: rgba(38,166,154,.4); }
.panel.sig-state-sell    { border-color: rgba(239,83,80,.4); }
.panel.sig-state-blocked { border-color: rgba(255,183,77,.4); }
.panel.sig-state-waiting { border-color: var(--border-default); }

/* Blocked reason */
.blocked-reason {
    font-size: 12px; color: var(--yellow);
    margin-top: 8px; line-height: 1.6;
}

/* Stats row below signal */
.stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    border-top: 1px solid var(--border-subtle);
}
.stat-item {
    padding: 10px 14px;
    border-right: 1px solid var(--border-subtle);
}
.stat-item:last-child { border-right: none; }
.stat-label { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
.stat-val   { font-family: var(--font-mono); font-feature-settings:"tnum" 1; font-size: 13px; font-weight: 600; color: var(--text-primary); }
.stat-val.up  { color: var(--green); }
.stat-val.dn  { color: var(--red); }
@media (max-width: 767px) { .stats-row { grid-template-columns: repeat(2,1fr); } }

/* ── Indicator panel ──────────────────────────────────────── */
.ind-section { padding: 12px 14px; border-bottom: 1px solid var(--border-subtle); }
.ind-section:last-child { border-bottom: none; }
.ind-section-label {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px;
}

/* Score pills */
.pills-wrap { display: flex; flex-wrap: wrap; gap: 5px; }
.pill {
    font-family: var(--font-mono); font-size: 11px;
    padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--border-default);
    color: var(--text-muted); background: transparent;
    white-space: nowrap;
}
.pill.active { border-color: var(--accent); color: var(--accent); background: rgba(41,98,255,.08); }
.pill.high   { border-color: var(--green);  color: var(--green);  background: rgba(38,166,154,.08); }
.pill.v-bonus { border-color: var(--green); color: var(--green); background: rgba(38,166,154,.08); }

/* Vote total */
.vote-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.vote-tag {
    font-family: var(--font-mono); font-size: 11px;
    padding: 2px 6px; border-radius: 3px;
    background: var(--bg-hover); color: var(--text-secondary);
}
.vote-sum { font-family: var(--font-mono); font-size: 13px; font-weight: 600; }
.vote-sum.buy  { color: var(--green); }
.vote-sum.sell { color: var(--red); }
.vote-sum.neu  { color: var(--text-muted); }

/* Collapsible detail toggle */
.expand-btn {
    font-size: 11px; font-weight: 500; letter-spacing: .5px;
    color: var(--accent); background: transparent; border: none;
    padding: 0; text-transform: uppercase;
}
.expand-btn:hover { opacity: .75; }

/* Indicator detail (expanded) */
.ind-detail-row {
    display: grid; grid-template-columns: 72px 1fr 60px;
    gap: 4px; padding: 4px 0;
    border-bottom: 1px solid var(--border-subtle);
    align-items: center; font-size: 11.5px;
}
.ind-detail-row:last-child { border-bottom: none; }
.idr-name  { color: var(--text-muted); letter-spacing: .3px; }
.idr-val   { font-family: var(--font-mono); font-feature-settings:"tnum" 1; color: var(--text-secondary); }
.idr-vote  { font-family: var(--font-mono); font-weight: 600; text-align: right; }
.idr-vote.p { color: var(--green); }
.idr-vote.n { color: var(--red); }
.idr-vote.z { color: var(--text-muted); }

/* Mini bar */
.mini-bar-wrap { height: 2px; background: var(--border-default); border-radius: 1px; margin-top: 3px; overflow: hidden; }
.mini-bar-fill { height: 100%; border-radius: 1px; }

/* ── History panel ─────────────────────────────────────────── */
.hist-row {
    display: grid;
    grid-template-columns: 22px 40px 36px 1fr 68px;
    gap: 6px; align-items: center;
    padding: 0 14px;
    height: 32px;
    border-bottom: 1px solid var(--border-subtle);
    font-size: 11.5px;
}
.hist-row:last-child { border-bottom: none; }
.hist-row:hover { background: var(--bg-hover); }
.hist-hdr {
    font-size: 10px; font-weight: 600; color: var(--text-muted);
    letter-spacing: .8px; text-transform: uppercase; height: 28px;
}
.h-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.h-dot.win  { background: var(--green); }
.h-dot.loss { background: var(--red); }
.h-dot.open { background: var(--text-muted); border: 1px solid var(--text-secondary); background: transparent; }
.h-dir  { font-weight: 600; font-size: 11px; }
.h-dir.buy  { color: var(--green); }
.h-dir.sell { color: var(--red); }
.h-score { font-family: var(--font-mono); color: var(--accent); font-size: 11.5px; }
.h-price { font-family: var(--font-mono); font-feature-settings:"tnum" 1; color: var(--text-secondary); font-size: 11px; }
.h-time  { font-size: 10.5px; color: var(--text-muted); text-align: right; font-family: var(--font-mono); }
.empty-hist { padding: 24px 14px; font-size: 12px; color: var(--text-muted); letter-spacing: .3px; }

/* Clear button */
.btn-clear {
    font-size: 10px; font-weight: 500; letter-spacing: .5px;
    padding: 2px 7px; border-radius: 3px;
    border: 1px solid var(--border-default);
    background: transparent; color: var(--text-muted);
    text-transform: uppercase;
}
.btn-clear:hover { border-color: var(--red); color: var(--red); }

/* ── Footer status bar ─────────────────────────────────────── */
footer {
    border-top: 1px solid var(--border-default);
    background: var(--bg-elevated);
    padding: 6px 16px;
    display: flex; align-items: center; gap: 16px;
    font-size: 11px; color: var(--text-muted);
    position: sticky; bottom: 0;
}
.sf-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sf-dot.ok  { background: var(--green); }
.sf-dot.err { background: var(--red); }
.sf-dot.loading { background: var(--yellow); }
.sf-sep { color: var(--border-default); }
#sfWinRate { font-family: var(--font-mono); }
#sfUpdate  { margin-left: auto; }

/* ── Backtest Panel ────────────────────────────────────────── */
.bt-panel { margin: 12px 16px; background: var(--bg-elevated); border: 1px solid var(--border-default); border-radius: var(--r); overflow: hidden; }
.bt-header { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border-subtle); }
.bt-label { font-size:11px; font-weight:600; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; }
.bt-select { font-size:11px; padding:3px 8px; border-radius:var(--r); background:var(--bg-hover); border:1px solid var(--border-default); color:var(--text-secondary); cursor:pointer; }
.bt-run-btn { font-size:11px; font-weight:600; padding:4px 12px; border-radius:var(--r); background:var(--accent); border:none; color:#fff; letter-spacing:.5px; cursor:pointer; }
.bt-run-btn:disabled { opacity:.4; cursor:not-allowed; }
.bt-body { padding:14px 16px; }
.bt-stats { display:grid; grid-template-columns:repeat(5,1fr); gap:0; border:1px solid var(--border-default); border-radius:var(--r); overflow:hidden; }
.bt-stat { padding:10px 12px; border-right:1px solid var(--border-subtle); }
.bt-stat:last-child { border-right:none; }
.bt-stat-label { font-size:10px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
.bt-stat-val { font-family:var(--font-mono); font-size:14px; font-weight:600; color:var(--text-primary); }
.bt-stat-val.pos { color:var(--green); }
.bt-stat-val.neg { color:var(--red); }
.bt-log { margin-top:12px; max-height:180px; overflow-y:auto; font-family:var(--font-mono); font-size:11px; color:var(--text-muted); line-height:1.8; }
.bt-log .win  { color:var(--green); }
.bt-log .loss { color:var(--red); }
.bt-log .draw { color:var(--text-muted); }
.bt-ev-cmp { font-size:12px; color:var(--text-muted); margin-top:8px; padding-top:8px; border-top:1px solid var(--border-subtle); display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
.bt-ev-cmp em { font-style:normal; font-family:var(--font-mono); }
.bt-ev-cmp .pos { color:var(--green); }
.bt-ev-cmp .neg { color:var(--red); }

/* ── Position Calculator ───────────────────────────────────── */
.pos-calc { margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border-subtle); }
.pos-calc-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.pos-calc-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
.pos-calc-input {
    font-size: 13px; font-family: var(--font-mono); padding: 4px 10px;
    background: var(--bg-hover); border: 1px solid var(--border-default);
    border-radius: var(--r); color: var(--text-primary); width: 120px;
}
.pos-calc-result { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
.pos-calc-result em { color: var(--text-primary); font-style: normal; font-family: var(--font-mono); }
.pos-calc-result .warn-loss { color: var(--red); font-weight: 600; }

/* ── Insight Card ──────────────────────────────────────────── */
.insight-card {
    margin: 0 16px 12px;
    padding: 16px 20px;
    background: #0d1117;
    border-radius: var(--r);
    line-height: 1.6;
    min-height: 100px;
}
.ic-title {
    font-size: 20px; font-weight: 700;
    font-family: var(--font-ui);
    color: var(--text-primary);
    margin-bottom: 6px;
}
.ic-title.ic-buy  { color: var(--green); }
.ic-title.ic-sell { color: var(--red);   }
.ic-row {
    font-size: 15px;
    color: var(--text-secondary);
    font-family: var(--font-ui);
    margin-top: 2px;
}
.ic-row em     { color: var(--text-primary); font-style: normal; }
.ic-row.ic-warn { color: var(--yellow); }
.ic-note {
    font-size: 13px; color: var(--text-muted);
    margin-top: 8px;
}
.ic-row.ic-trend-warn { color: var(--yellow); font-weight: 600; margin-top: 4px; }
.mkt-badge {
    font-size: 11px; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; letter-spacing: .5px;
}
.mkt-badge.ranging  { background: var(--bg-hover); color: var(--text-muted); border: 1px solid var(--border-default); }
.mkt-badge.trend-up { background: rgba(38,166,154,.18); color: var(--green); border: 1px solid var(--green); }
.mkt-badge.trend-dn { background: rgba(239,83,80,.18);  color: var(--red);   border: 1px solid var(--red); }
</style>
</head>
<body>
<!-- ── Header ────────────────────────────────────────────── -->
<header>
    <div class="hdr-l">
        <span class="logo"><em>BTC</em>/USD</span>
        <span class="pair-meta">· Kraken · 15m</span>
    </div>
    <div class="hdr-c">
        <span id="tb-price" class="mono">--</span>
        <span id="tb-change" class="chg-badge">--</span>
    </div>
    <div class="hdr-r">
        <span id="mktBadge" class="mkt-badge ranging" style="display:none">震荡市</span>
        <span class="hdr-countdown">
            <span id="nextTicker">--s</span> · <span id="nextSignal">--s</span>
        </span>
        <label class="news-toggle-wrap" title="消息面模式">
            <input type="checkbox" id="newsToggle" onchange="onNewsToggle()">
            <span id="newsLabel">消息面关</span>
        </label>
        <button class="hdr-btn" onclick="runSignal()">↻ 刷新</button>
        <button class="hdr-btn" onclick="document.getElementById('btPanel').style.display='block'">回测</button>
    </div>
</header>

<!-- ── News banner ─────────────────────────────────────────── -->
<div id="newsBanner">⚠ 消息面模式已开启 — 所有信号已暂停</div>

<!-- ── Insight Card ────────────────────────────────────────── -->
<div id="insightCard" class="insight-card"></div>

<!-- ── 3-column layout ─────────────────────────────────────── -->
<div class="layout">

    <!-- LEFT: Indicators ──────────────────────────────────── -->
    <aside class="panel col-indicators">
        <div class="panel-header">指标</div>

        <div class="ind-section">
            <div class="ind-section-label">评分</div>
            <div class="pills-wrap" id="scorePills"></div>
            <div style="margin-top:6px;font-size:11px;color:var(--text-muted)" id="bbWidthRow"></div>
        </div>

        <div class="ind-section">
            <div class="ind-section-label">方向投票</div>
            <div class="vote-row" id="voteRow"></div>
        </div>

        <div class="ind-section">
            <button class="expand-btn" id="expandBtn" onclick="toggleDetail()">▸ 详情</button>
        </div>

        <div class="ind-section" id="indicatorDetail" style="display:none">
            <div id="detailRows"></div>
        </div>
    </aside>

    <!-- CENTER: Signal ─────────────────────────────────────── -->
    <section class="panel col-signal">
        <div class="panel-header">信号</div>
        <div class="sig-body">
            <div id="sigStatus">观望中</div>
            <div id="sigSub" class="sig-sub"></div>
            <div id="scoreBarWrap" class="score-bar-wrap">
                <div class="score-bar-fill" id="scoreBarFill" style="width:0%"></div>
            </div>
            <div id="scoreLegend" class="score-legend"></div>
            <div id="blockedReason" class="blocked-reason" style="display:none"></div>
            <div id="entryTable" class="entry-tbl" style="display:none"></div>
            <div class="pos-calc">
                <div class="pos-calc-row">
                    <span class="pos-calc-label">账户净值 USD</span>
                    <input class="pos-calc-input" id="posEquity" type="number" placeholder="10000" oninput="calcPositionSize()">
                </div>
                <div class="pos-calc-result" id="posResult">输入账户净值后显示建议仓位…</div>
            </div>
        </div>
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">最高</div>
                <div class="stat-val up" id="high24">--</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">最低</div>
                <div class="stat-val dn" id="low24">--</div>
            </div>

/* ================================================================
   KRAKEN OHLC (30s) — signal engine data
   ================================================================ */
async function fetchOHLC(interval) {
    const url  = 'https://api.kraken.com/0/public' + '/OHLC?pair=' + 'XBTUSD' + '&interval=' + interval;
    const resp = await fetch(url);

    const raw = data.result['XBTUSD'] || data.result['XXBTZUSD'];

    }));
}

/* ================================================================
   RSI — Wilder smoothing  (Jesse: jesse/indicators/rsi.py)
   ================================================================ */
function calcRSI(closes, period) {
    period = period || 14;
    if (closes.length < period + 1) return null;
    let avgGain = 0, avgLoss = 0;
    for (let i = 1; i <= period; i++) {
        const d = closes[i] - closes[i - 1];
        if (d > 0) avgGain += d; else avgLoss += Math.abs(d);
    }
    avgGain /= period; avgLoss /= period;
    for (let i = period + 1; i < closes.length; i++) {
        const d = closes[i] - closes[i - 1];
        avgGain = (avgGain * (period - 1) + (d > 0 ? d : 0))           / period;
        avgLoss = (avgLoss * (period - 1) + (d < 0 ? Math.abs(d) : 0)) / period;
    }
    if (avgLoss === 0) return 100;
    return 100 - (100 / (1 + avgGain / avgLoss));
}

/* Jesse: jesse/indicators/bollinger_bands.py */
function calcBB(closes, period, mult) {
    period = period || 20; mult = mult || 2;
    if (closes.length < period) return null;
    const slice  = closes.slice(-period);
    const middle = slice.reduce((s, v) => s + v, 0) / period;
    const std    = Math.sqrt(slice.reduce((s, v) => s + (v - middle) ** 2, 0) / period);
    const upper  = middle + mult * std;
    const lower  = middle - mult * std;
    const last   = closes[closes.length - 1];
    const pct    = upper !== lower ? (last - lower) / (upper - lower) : 0.5;
    const width  = middle !== 0   ? (upper - lower) / middle          : 0;
    return { upper, middle, lower, pct, width };
}

/* Jesse: jesse/indicators/ema.py */
function calcEMA(closes, period) {
    if (closes.length < period) return closes[closes.length - 1];
    const k = 2 / (period + 1);
    let ema = closes.slice(0, period).reduce((s, v) => s + v, 0) / period;
    for (let i = period; i < closes.length; i++) ema = closes[i] * k + ema * (1 - k);
    return ema;
}

/* Jesse: jesse/indicators/vwap.py — daily reset */
function calcVWAP(candles) {
    if (!candles || !candles.length) return null;
    const now   = new Date();
    const today = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate());
    let cumVP = 0, cumV = 0;
    for (const c of candles) {
        if (c.time < today) continue;
        const tp = (c.high + c.low + c.close) / 3;
        cumVP += tp * c.volume; cumV += c.volume;
    }
    return cumV > 0 ? cumVP / cumV : null;
}

function calcVolRatio(volumes, period) {
    period = period || 20;
    if (volumes.length < period + 1) return 1;
    const avg = volumes.slice(-period - 1, -1).reduce((s, v) => s + v, 0) / period;
    return avg > 0 ? volumes[volumes.length - 1] / avg : 1;
}

/* ReinforcedQuickie: MFI */
function calcMFI(candles, period) {
    period = period || 14;
    if (candles.length < period + 1) return 50;
    const slice = candles.slice(-(period + 1));
    let pos = 0, neg = 0;
    for (let i = 1; i <= period; i++) {
        const tp  = (slice[i].high   + slice[i].low   + slice[i].close)   / 3;
        const tpP = (slice[i-1].high + slice[i-1].low + slice[i-1].close) / 3;
        const mf  = tp * slice[i].volume;
        if      (tp > tpP) pos += mf;
        else if (tp < tpP) neg += mf;
    }
    if (neg === 0) return 100;
    return 100 - 100 / (1 + pos / neg);
}

/* ReinforcedQuickie: V-bottom — 5 declining bars then upturn */
/* ATR — Wilder's smoothing（与 TradingView 一致）*/
/* ADX — Wilder 平滑（趋势强度过滤）*/
function calcADX(candles, period) {
    period = period || 14;
    if (candles.length < period * 2) return null;
    const trs = [], plusDMs = [], minusDMs = [];
    for (let i = 1; i < candles.length; i++) {
        const h = candles[i].high, l = candles[i].low;
        const ph = candles[i-1].high, pl = candles[i-1].low, pc = candles[i-1].close;
        trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
        const upMove = h - ph, downMove = pl - l;
        plusDMs.push(upMove > downMove && upMove > 0 ? upMove : 0);
        minusDMs.push(downMove > upMove && downMove > 0 ? downMove : 0);
    }
    const smooth = arr => {
        let s = arr.slice(0, period).reduce((a, b) => a + b, 0);
        const r = [s];
        for (let i = period; i < arr.length; i++) { s = s - s / period + arr[i]; r.push(s); }
        return r;
    };
    const sTR = smooth(trs), sPDM = smooth(plusDMs), sMDM = smooth(minusDMs);
    const DIs = sTR.map((tr, i) => ({
        plus:  tr ? 100 * sPDM[i] / tr : 0,
        minus: tr ? 100 * sMDM[i] / tr : 0,
    }));
    const DXs = DIs.map(d => {
        const s = d.plus + d.minus;
        return s ? 100 * Math.abs(d.plus - d.minus) / s : 0;
    });
    let adx = DXs.slice(0, period).reduce((a, b) => a + b, 0) / period;
    for (let i = period; i < DXs.length; i++) adx = (adx * (period - 1) + DXs[i]) / period;
    return { adx, plusDI: DIs[DIs.length - 1].plus, minusDI: DIs[DIs.length - 1].minus };
}

function calcATR(candles, period) {
    period = period || 14;
    if (candles.length < period + 1) return null;
    const trs = [];
    for (let i = 1; i < candles.length; i++) {
        const h = candles[i].high, l = candles[i].low, pc = candles[i - 1].close;
        trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
    }
    let atr = trs.slice(0, period).reduce((a, b) => a + b, 0) / period;
    for (let i = period; i < trs.length; i++) atr = (atr * (period - 1) + trs[i]) / period;
    return atr;
}

function detectVBottom(candles) {
    if (candles.length < 6) return false;
    const avg = candles.slice(-6).map(c => (c.open + c.high + c.low + c.close) / 4);
    for (let i = 0; i < 4; i++) if (avg[i] <= avg[i + 1]) return false;
    return avg[5] > avg[4];
}

/* ── Scoring  (Freqtrade trigger structure) ──────────────── */
function scoreRSI(rsi) {
    if (rsi === null) return { score: 0, vote: 0 };
    let score = 0, vote = 0;
    if      (rsi <= 20) { score = 25; vote = +1; }
    else if (rsi <= 30) { score = 20; vote = +1; }
    else if (rsi <= 38) { score = 10; vote = +1; }
    else if (rsi <= 45) { score =  4; vote = +1; }
    else if (rsi <  55) { score =  0; vote =  0; }
    else if (rsi <  62) { score =  4; vote = -1; }
    else if (rsi <  70) { score = 10; vote = -1; }
    else if (rsi <  80) { score = 20; vote = -1; }
    else                { score = 25; vote = -1; }
    return { score, vote };
}
function scoreBB(pct) {
    let score = 0, vote = 0;
    if      (pct <= 0)    { score = 25; vote = +1; }
    else if (pct <= 0.1)  { score = 22; vote = +1; }
    else if (pct <= 0.2)  { score = 16; vote = +1; }
    else if (pct <= 0.35) { score =  7; vote = +1; }
    else if (pct <= 0.65) { score =  0; vote =  0; }
    else if (pct <= 0.8)  { score =  7; vote = -1; }
    else if (pct <= 0.9)  { score = 16; vote = -1; }
    else if (pct <= 1.0)  { score = 22; vote = -1; }
    else                  { score = 25; vote = -1; }
    return { score, vote };
}
function scoreVWAP(devPct) {
    const abs = Math.abs(devPct);
    let score = 0;
    if      (abs >= 2.0) score = 25;
    else if (abs >= 1.2) score = 20;
    else if (abs >= 0.6) score = 14;
    else if (abs >= 0.3) score =  7;
    else                 score =  2;
    return { score, vote: devPct < 0 ? +1 : devPct > 0 ? -1 : 0 };
}
/* ReinforcedQuickie: MFI replaces raw volume ratio */
function scoreMFI(mfi) {
    let score = 0, vote = 0;
    if      (mfi <= 20) { score = 25; vote = +1; }
    else if (mfi <= 30) { score = 20; vote = +1; }
    else if (mfi <= 38) { score = 10; vote = +1; }
    else if (mfi <= 45) { score =  4; vote = +1; }
    else if (mfi <  55) { score =  0; vote =  0; }
    else if (mfi <  62) { score =  4; vote = -1; }
    else if (mfi <  70) { score = 10; vote = -1; }
    else if (mfi <  80) { score = 20; vote = -1; }
    else                { score = 25; vote = -1; }
    return { score, vote };
}

/* ── Risk manager  (Freqtrade EMA trend filter) ──────────── */
function riskCheck(direction, ema20, ema50) {
    if (newsMode)                               return { pass: false, reason: 'News mode active' };
    if (direction === 'BUY'  && ema20 < ema50)  return { pass: false, reason: 'EMA20 < EMA50 — 空头趋势，禁止做多' };
    if (direction === 'SELL' && ema20 > ema50)  return { pass: false, reason: 'EMA20 > EMA50 — 多头趋势，禁止做空' };
    return { pass: true, reason: 'OK' };
}

/* ── Signal engine ───────────────────────────────────────── */
function generateSignal(closes, candles, volumes, cfg, h1Candles) {
    cfg = cfg || PRESETS.base;
    const last     = closes[closes.length - 1];
    const rsi      = calcRSI(closes);
    const bb       = calcBB(closes);
    const vwap     = calcVWAP(candles);
    const ema20    = calcEMA(closes, cfg.EMA_SHORT);
    const ema50    = calcEMA(closes, cfg.EMA_LONG);
    const volRatio = calcVolRatio(volumes);
    const mfi      = calcMFI(candles);

    const volAvg30 = volumes.length >= 31
        ? volumes.slice(-31, -1).reduce((s, v) => s + v, 0) / 30 : 0;
    const volSpike = volAvg30 > 0 && volumes[volumes.length - 1] > volAvg30 * 20;

    // 成交量结构确认（最近20根均量）
    const volAvg20 = volumes.length >= 21
        ? volumes.slice(-21, -1).reduce((s, v) => s + v, 0) / 20 : 0;
    const curVol   = volumes[volumes.length - 1];
    const volRatio20 = volAvg20 > 0 ? curVol / volAvg20 : 1;
    const volConfirm = volRatio20 > 1.3 ? 'strong' : volRatio20 < 0.7 ? 'weak' : 'normal';

    const rsiR  = scoreRSI(rsi);
    const bbR   = scoreBB(bb ? bb.pct : 0.5);
    const vwapR = vwap ? scoreVWAP((last - vwap) / vwap * 100) : { score: 0, vote: 0 };
    const mfiR  = scoreMFI(mfi);

    const vBottom    = detectVBottom(candles);
    const vBonus     = vBottom ? 10 : 0;
    const volBonus   = volConfirm === 'strong' ? 8 : 0;
    const baseScore  = rsiR.score + bbR.score + vwapR.score + mfiR.score;
    const totalScore = Math.min(100, baseScore + vBonus + volBonus);

    const votes     = rsiR.vote + bbR.vote + vwapR.vote + mfiR.vote;
    const direction = votes > 0 ? 'BUY' : votes < 0 ? 'SELL' : 'NEUTRAL';

    const risk = volSpike
        ? { pass: false, reason: 'Vol spike >20× avg — manipulation filter' }
        : riskCheck(direction, ema20, ema50);

    const strength = totalScore >= 85 ? '🔥 强信号'
                   : totalScore >= cfg.SIG_THRESHOLD ? '✓ 标准信号'
                   : totalScore >= 60 ? '⚠ 弱信号'
                   : '未达阈值';

    // ADX 趋势强度过滤（ADX<20 = 震荡市，暂停信号）
    const adxData = calcADX(candles);
    const adx = adxData ? adxData.adx : 25;

    // ATR 动态止损（Freqtrade 社区标准，BTC 15m）
    const atr = calcATR(candles);
    let stopLong, stopShort, tpLong, tpShort, rrRatio;
    if (atr) {
        const slDist = Math.min(
            Math.max(atr * cfg.ATR_SL_MULT, last * 0.008),
            last * 0.03
        );
        const tpDist = slDist * (cfg.ATR_TP_MULT / cfg.ATR_SL_MULT);
        stopLong  = (last - slDist).toFixed(2);
        stopShort = (last + slDist).toFixed(2);
        tpLong    = (last + tpDist).toFixed(2);
        tpShort   = (last - tpDist).toFixed(2);
        rrRatio   = (tpDist / slDist).toFixed(1);
    } else {
        stopLong  = (last * (1 - cfg.STOP_LOSS_PCT)).toFixed(2);
        stopShort = (last * (1 + cfg.STOP_LOSS_PCT)).toFixed(2);
        tpLong    = (last * (1 + cfg.TAKE_PROFIT_PCT)).toFixed(2);
        tpShort   = (last * (1 - cfg.TAKE_PROFIT_PCT)).toFixed(2);
        rrRatio   = (cfg.TAKE_PROFIT_PCT / cfg.STOP_LOSS_PCT).toFixed(1);
    }

    let finalRisk = (adx < cfg.ADX_MIN && risk.pass)
        ? { pass: false, reason: `ADX ${adx.toFixed(0)} < ${cfg.ADX_MIN}，震荡市，信号暂停` }
        : risk;

    if (finalRisk.pass && volConfirm === 'weak')
        finalRisk = { pass: false, reason: '缩量信号，可靠性低' };

    if (finalRisk.pass && h1Candles && h1Candles.length >= 55) {
        const h1Closes = h1Candles.map(c => c.close);
        const h1Ema20  = calcEMA(h1Closes, 20);
        const h1Ema50  = calcEMA(h1Closes, 50);
        if (direction === 'BUY'  && h1Ema20 <= h1Ema50)
            finalRisk = { pass: false, reason: '1h趋势反向，信号降级' };
        if (direction === 'SELL' && h1Ema20 >= h1Ema50)
            finalRisk = { pass: false, reason: '1h趋势反向，信号降级' };
    }

    const marketState = detectMarketState(bb, ema20, ema50, last);

    return {
        score: totalScore, direction, strength, risk: finalRisk,
        scores: { rsi: rsiR.score, bb: bbR.score, vwap: vwapR.score, mfi: mfiR.score, vBonus },
        votes:  { rsi: rsiR.vote,  bb: bbR.vote,  vwap: vwapR.vote,  mfi: mfiR.vote  },
        raw:    { rsi, bb, vwap, ema20, ema50, volRatio, mfi, volSpike, vBottom, last },
        stopLong, stopShort, tpLong, tpShort, rrRatio, marketState, volConfirm,
    };
}

function detectMarketState(bb, ema20, ema50, price) {
    if (!bb || !price) return 'RANGING';
    const bbWidth = (bb.upper - bb.lower) / bb.middle;
    const spread  = Math.abs(ema20 - ema50) / price;
    if (bbWidth > 0.04 && spread > 0.008) {
        return ema20 > ema50 ? 'TRENDING_UP' : 'TRENDING_DOWN';
    }
    return 'RANGING';
}

/* ================================================================
   HISTORY  (localStorage, max 200)
   ================================================================ */
function loadHistory() {
    try {
        const raw = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        const cutoff = Date.now() - 30 * 24 * 3600 * 1000;
        return raw.filter(h => h.ts >= cutoff);
    } catch { return []; }
}
function saveHistory(list) { localStorage.setItem(HISTORY_KEY, JSON.stringify(list.slice(-200))); }

/* ================================================================
   AUTO BACKFILL  — 首次打开冷启动 + 每次补缺历史数据
   ================================================================ */
async function autoBackfill() {
    const OKX_BASE = 'https://www.okx.com/api/v5/market/candles';
    const INST     = 'BTC-USDT';
    const BAR      = '15m';
    const LIMIT    = 100;
    const STEP     = LIMIT * 15 * 60 * 1000;

    const history  = loadHistory();
    const now      = Date.now();
    const COLD_DAYS = 90;
    const GAP_MS    = 60 * 60 * 1000; // 1小时

    let fetchStart, fetchEnd;
    if (history.length < 10) {
        // 冷启动：拉90天
        fetchStart = now - COLD_DAYS * 24 * 3600 * 1000;
        fetchEnd   = now;
    } else {
        const lastTs = Math.max(...history.map(h => h.ts));
        if (now - lastTs < GAP_MS) return; // 数据新鲜，跳过
        fetchStart = lastTs;
        fetchEnd   = now;
    }

    const sb = document.getElementById('status-bar');
    if (sb) sb.textContent = '正在补缺历史数据…';

    // 分窗口拉取K线
    const allCandles = [];
    let winStart = fetchStart;
    let failCount = parseInt(localStorage.getItem('backfill_fail_count') || '0');

    try {
        while (winStart < fetchEnd) {
            const winEnd = Math.min(winStart + STEP, fetchEnd);
            let ok = false;
            for (let attempt = 0; attempt < 2; attempt++) {
                try {
                    const url = `${OKX_BASE}?instId=${INST}&bar=${BAR}&limit=${LIMIT}&after=${winEnd}&before=${winStart}`;
                    const res  = await fetch(url);
                    const json = await res.json();
                    if (json.code !== '0' || !json.data) break;
                    for (const d of json.data) {
                        allCandles.push({
                            time:   parseInt(d[0]),
                            open:   parseFloat(d[1]),
                            high:   parseFloat(d[2]),
                            low:    parseFloat(d[3]),
                            close:  parseFloat(d[4]),
                            volume: parseFloat(d[5]),
                        });
                    }
                    ok = true;
                    break;
                } catch (e) {
                    if (attempt === 1) {
                        const msg = `autoBackfill 窗口失败 [${new Date(winStart).toISOString()}~${new Date(winEnd).toISOString()}]: ${e.message}`;
                        console.error(msg);
                        failCount++;
                        localStorage.setItem('backfill_fail_count', failCount);
                        if (sb) sb.textContent = `补缺失败(${failCount}次): ${e.message}`;
                    }
                    await new Promise(r => setTimeout(r, 500));
                }
            }
            if (!ok && allCandles.length === 0) break;
            winStart = winEnd + 1;
            await new Promise(r => setTimeout(r, 300));
        }
    } catch (err) {
        failCount++;
        localStorage.setItem('backfill_fail_count', failCount);
        console.error('autoBackfill 致命错误:', err);
        if (sb) sb.textContent = `补缺异常(${failCount}次): ${err.message}`;
        return;
    }

    if (allCandles.length < 50) {
        if (sb) sb.textContent = '';
        return;
    }

    // 去重 + 排序
    const seen = new Set();
    const uniq = allCandles.filter(c => { if (seen.has(c.time)) return false; seen.add(c.time); return true; });
    uniq.sort((a, b) => a.time - b.time);

    // 逐根K线跑信号
    const MIN_LEN = Math.max(20, 14, 50) + 10; // BB_PERIOD=20, RSI_PERIOD=14, EMA_LONG=50
    const existingTs = new Set(loadHistory().map(h => h.ts));
    const newRecords  = [];
    const DEDUP_MS    = 30 * 60 * 1000;

    for (let i = MIN_LEN; i < uniq.length; i++) {
        const slice   = uniq.slice(0, i + 1);
        const closes  = slice.map(c => c.close);
        const volumes = slice.map(c => c.volume);
        const sig     = generateSignal(closes, slice, volumes);
        if (!sig || sig.score < PRESETS.base.SIG_THRESHOLD || !sig.risk.pass) continue;

        const ts = uniq[i].time;
        if (existingTs.has(ts)) continue;

        // 去重：同方向30分钟内只保留第一条
        const recent = newRecords.filter(r => r.direction === sig.direction && Math.abs(r.ts - ts) < DEDUP_MS);
        if (recent.length > 0) continue;

        // 判断WIN/LOSS：扫描未来K线
        let outcome = null;
        const sl = parseFloat(sig.direction === 'BUY' ? sig.stopLong  : sig.stopShort);
        const tp = parseFloat(sig.direction === 'BUY' ? sig.tpLong    : sig.tpShort);
        for (let j = i + 1; j < uniq.length; j++) {
            const fc = uniq[j];
            if (sig.direction === 'BUY') {
                if (fc.low  <= sl) { outcome = 'LOSS'; break; }
                if (fc.high >= tp) { outcome = 'WIN';  break; }
            } else {
                if (fc.high >= sl) { outcome = 'LOSS'; break; }
                if (fc.low  <= tp) { outcome = 'WIN';  break; }
            }
        }

        const price = uniq[i].close;
        newRecords.push({
            ts,
            time:      new Date(ts).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }),
            direction: sig.direction,
            strength:  sig.strength,
            score:     sig.score,
            price:     price.toFixed(2),
            stop:      sig.direction === 'BUY' ? sig.stopLong : sig.stopShort,
            bbTarget:  sig.direction === 'BUY' ? parseFloat(sig.tpLong) : parseFloat(sig.tpShort),
            rsi:       sig.raw.rsi ? sig.raw.rsi.toFixed(1) : '--',
            bbPct:     sig.raw.bb  ? (sig.raw.bb.pct * 100).toFixed(1) + '%' : '--',
            emaTrend:  sig.raw.ema20 > sig.raw.ema50 ? 'bull' : 'bear',
            outcome,
        });
        existingTs.add(ts);
    }

    if (newRecords.length > 0) {
        const merged = [...loadHistory(), ...newRecords];
        merged.sort((a, b) => a.ts - b.ts);
        saveHistory(merged);
        renderHistory();
        renderStatusFooter();
    }

    if (sb) sb.textContent = '';
}

function logSignal(sig) {
    if (sig.score < PRESETS.base.SIG_THRESHOLD || !sig.risk.pass) return;
    const history = loadHistory();
    const last    = history[history.length - 1];
    const now     = Date.now();
    if (last && last.direction === sig.direction && (now - last.ts) < 30 * 60 * 1000) return;
    const { rsi, bb, ema20, ema50, last: price } = sig.raw;
    history.push({
        ts:        now,
        time:      new Date(now).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' }),
        direction: sig.direction,
        strength:  sig.strength,
        score:     sig.score,
        price:     price.toFixed(2),
        stop:      sig.direction === 'BUY' ? sig.stopLong : sig.stopShort,
        bbTarget:  sig.direction === 'BUY' ? parseFloat(sig.tpLong) : parseFloat(sig.tpShort),
        rsi:       rsi ? rsi.toFixed(1) : '--',
        bbPct:     bb  ? (bb.pct * 100).toFixed(1) + '%' : '--',
        emaTrend:  ema20 > ema50 ? 'bull' : 'bear',
        outcome:   null,
    });
    saveHistory(history);
}

function updateOpenSignals(candles) {
    const history = loadHistory();
    let changed = false;
    const intervalMs = 15 * 60 * 1000;
    for (const h of history) {
        if (h.outcome) continue;
        const sl = parseFloat(h.stop);
        const tp = h.bbTarget != null ? parseFloat(h.bbTarget) : null;
        if (tp == null) continue;
        // include the candle that was active when signal fired
        for (const c of candles) {
            if (c.time < h.ts - intervalMs) continue;
            if (h.direction === 'BUY') {
                if (c.low <= sl)       { h.outcome = 'LOSS'; changed = true; break; }
                if (c.high >= tp)      { h.outcome = 'WIN';  changed = true; break; }
            } else {
                if (c.high >= sl)      { h.outcome = 'LOSS'; changed = true; break; }
                if (c.low  <= tp)      { h.outcome = 'WIN';  changed = true; break; }
            }
        }
    }
    if (changed) { saveHistory(history); renderHistory(); renderStatusFooter(); }
}

function clearHistory() {
    if (!confirm('确认清空所有历史信号记录？')) return;
    localStorage.removeItem(HISTORY_KEY);
    renderHistory(); renderStatusFooter();
}

function renderHistory() {
    const history = loadHistory();
    const list    = document.getElementById('histList');

    if (!history.length) {
        list.innerHTML = '<div class="empty-hist">暂无信号记录</div>';
        return;
    }

    const fmt = v => '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2 });

    list.innerHTML = history.slice().reverse().map(h => {
        const o    = h.outcome;
        const dotCls = o === 'WIN' ? 'win' : o === 'LOSS' ? 'loss' : 'open';
        const dirCls = h.direction === 'BUY' ? 'buy' : 'sell';
        const dirTxt = h.direction === 'BUY' ? '▲ 做多' : '▼ 做空';
        return '<div class="hist-row">'
            + '<span class="h-dot ' + dotCls + '"></span>'
            + '<span class="h-dir ' + dirCls + '">' + dirTxt + '</span>'
            + '<span class="h-score">' + h.score + '</span>'
            + '<span class="h-price">' + fmt(h.price) + '</span>'
            + '<span class="h-time">' + relativeTime(h.ts) + '</span>'
            + '</div>';
    }).join('');
}

function renderStatusFooter() {
    const history  = loadHistory();
    const resolved = history.filter(h => h.outcome === 'WIN' || h.outcome === 'LOSS');
    const open     = history.filter(h => !h.outcome).length;
    const wins     = resolved.filter(h => h.outcome === 'WIN').length;
    const recent   = history.slice(-20).filter(h => h.outcome === 'WIN' || h.outcome === 'LOSS');
    const recentW  = recent.filter(h => h.outcome === 'WIN').length;

    const wr = document.getElementById('sfWinRate');
    if (resolved.length >= 3) {
        const total = (wins / resolved.length * 100).toFixed(0);
        const r20   = recent.length >= 3
            ? ' · 近20笔：' + (recentW / recent.length * 100).toFixed(0) + '%'
            : '';
        wr.textContent = '胜率：' + total + '%（' + wins + '/' + resolved.length + '）' + r20 + ' · 持仓中：' + open + ' 笔';
    } else {
        const need = Math.max(0, 3 - resolved.length);
        wr.textContent = '胜率：暂无 · 持仓中：' + open + ' 笔 · 还差 ' + need + ' 笔信号才显示胜率';
    }
}

/* ================================================================
   RENDER INSIGHT CARD
   ================================================================ */
function renderInsightCard(sig) {
    const el = document.getElementById('insightCard');
    if (!el) return;
    const parts = [];

    if (!sig || newsMode) {
        parts.push('<div class="ic-title">📊 当前状态：观望中</div>');
        parts.push('<div class="ic-row">➜ 等待行情数据加载…</div>');
        el.innerHTML = parts.join('');
        return;
    }

    const score       = sig.score;
    const aboveThresh = score >= PRESETS.base.SIG_THRESHOLD;
    const isBlocked   = !sig.risk.pass;
    const isBuy       = sig.direction === 'BUY';
    const vs          = sig.votes;
    const fmtP        = v => '$' + Number(v).toLocaleString('en-US',
        { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    const fmtP2       = v => '$' + Number(v).toLocaleString('en-US',
        { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    if (isBlocked && aboveThresh) {
        // 评分达标但被风控拦截
        parts.push('<div class="ic-title">📊 评分达标 — 已拦截</div>');
        parts.push('<div class="ic-row ic-warn">⚠️ ' + sig.risk.reason + '</div>');
    } else if (!aboveThresh) {
        // 观望：距离触发差几分，哪几个指标未对齐
        parts.push('<div class="ic-title">📊 当前状态：观望中</div>');
        const gap    = Math.max(0, PRESETS.base.SIG_THRESHOLD - score);
        const dirTxt = isBuy ? '做多' : sig.direction === 'SELL' ? '做空' : '交易';
        parts.push('<div class="ic-row">➜ 距 <em>' + dirTxt + '</em> 信号还差 <em>'
            + gap + ' 分</em>（当前 <em>' + score + '/100</em>，需 ≥ '
            + PRESETS.base.SIG_THRESHOLD + '）</div>');

        // 未对齐的指标
        const notAligned = [];
        if (isBuy  && vs.rsi  <= 0) notAligned.push('RSI（未超卖）');
        if (!isBuy && vs.rsi  >= 0) notAligned.push('RSI（未超买）');
        if (isBuy  && vs.bb   <= 0) notAligned.push('BB（未触下轨）');
        if (!isBuy && vs.bb   >= 0) notAligned.push('BB（未触上轨）');
        if (isBuy  && vs.vwap <= 0) notAligned.push('VWAP（价格未跌破）');
        if (!isBuy && vs.vwap >= 0) notAligned.push('VWAP（价格未突破）');
        if (isBuy  && vs.mfi  <= 0) notAligned.push('MFI（资金未流出）');
        if (!isBuy && vs.mfi  >= 0) notAligned.push('MFI（资金未流入）');
        if (notAligned.length > 0)
            parts.push('<div class="ic-row">➜ 未对齐：<em>' + notAligned.join('、') + '</em></div>');
        if (score >= 60 && score < PRESETS.base.SIG_THRESHOLD) {
            parts.push('<div class="ic-row ic-warn">⚠ 弱信号，建议减半仓位（若触发）</div>');
        }
        parts.push('<div class="ic-row">➜ 没有可执行的交易，继续等待</div>');
    } else {
        // 信号触发
        const titleCls = isBuy ? 'ic-buy' : 'ic-sell';
        const titleTxt = isBuy
            ? '🟢 做多信号（评分 ' + score + '）'
            : '🔴 做空信号（评分 ' + score + '）';
        parts.push('<div class="ic-title ' + titleCls + '">' + titleTxt + '</div>');

        if (sig.marketState === 'TRENDING_UP' || sig.marketState === 'TRENDING_DOWN') {
            parts.push('<div class="ic-row ic-trend-warn">趋势市 — 均值回归胜率下降，建议观望</div>');
        }

        const entryP    = sig.raw.last;
        const limitP    = isBuy ? entryP * 0.995 : entryP * 1.005;
        const stopPrice = parseFloat(isBuy ? sig.stopLong : sig.stopShort);
        const slPct     = (Math.abs(entryP - stopPrice) / entryP * 100).toFixed(2);

        parts.push('<div class="ic-row">➜ 入场　市价 <em>' + fmtP(entryP)
            + '</em>　或挂单 <em>' + fmtP2(limitP) + '</em></div>');
        parts.push('<div class="ic-row">➜ 止损　<em>' + fmtP2(stopPrice)
            + '</em>　（距入场 <em>' + slPct + '%</em>）跟踪止损，盈利 0.5R 后开始移动</div>');
        parts.push('<div class="ic-row">➜ 止损状态　<em>等待激活</em></div>');

        if (sig.volConfirm === 'strong') {
            parts.push('<div class="ic-row" style="color:var(--green)">➜ 成交量放量确认 ✓</div>');
        } else {
            parts.push('<div class="ic-row">➜ 成交量正常</div>');
        }

        const hist     = loadHistory();
        const resolved = hist.filter(r => r.outcome === 'WIN' || r.outcome === 'LOSS');
        const wins     = resolved.filter(r => r.outcome === 'WIN').length;
        if (resolved.length >= 3) {
            parts.push('<div class="ic-row">➜ 历史胜率 <em>'
                + (wins / resolved.length * 100).toFixed(0)
                + '%</em>（' + wins + ' 胜 ' + (resolved.length - wins) + ' 负）</div>');
        }
        parts.push('<div class="ic-note">⚠️ 机器信号，实盘前请人工确认</div>');
    }

    el.innerHTML = parts.join('');
}

          sub: volSpike ? '异常成交量 — 已拦截' : volRatio >= 1.5 ? '偏高' : '正常',
          vote: 0, bar: Math.min(1, volRatio / 3) },
        { name: 'EMA 20/50',val: ema20.toFixed(0) + ' / ' + ema50.toFixed(0),
          sub: ema20 > ema50 ? '多头' : '空头',
          vote: 0, bar: null },
        { name: 'BB带宽',    val: bb ? (bb.width * 100).toFixed(2) + '%' : '--',
          sub: bb ? (bb.width * 100 > 6 ? '趋势行情' : bb.width * 100 > 4 ? '带宽扩张' : '震荡行情') : '--',
          vote: 0, bar: bb ? Math.min(1, bb.width / 0.08) : 0 },
    ];
    const barColor = score => score >= 60 ? 'var(--green)' : score >= 30 ? 'var(--accent)' : 'var(--text-muted)';
    document.getElementById('detailRows').innerHTML = rows.map(r => {
        const vc = r.vote > 0 ? 'p' : r.vote < 0 ? 'n' : 'z';
        const vt = r.vote > 0 ? '+1' : r.vote < 0 ? '−1' : '0';
        const barHtml = r.bar !== null
            ? '<div class="mini-bar-wrap"><div class="mini-bar-fill" style="width:' + (r.bar * 100).toFixed(0) + '%;background:' + barColor(r.bar * 100) + '"></div></div>'
            : '';
        return '<div class="ind-detail-row">'
            + '<span class="idr-name">' + r.name + '</span>'
            + '<span class="idr-val">' + r.val + '<br><span style="color:var(--text-muted);font-size:10px">' + r.sub + '</span>' + barHtml + '</span>'
            + '<span class="idr-vote ' + vc + '">' + vt + '</span>'
            + '</div>';
    }).join('');
}

/* ================================================================
   RENDER SIGNAL CARD
   ================================================================ */
function renderSignalCard(sig) {
    const statusEl = document.getElementById('sigStatus');
    const subEl    = document.getElementById('sigSub');
    const barFill  = document.getElementById('scoreBarFill');
    const barWrap  = document.getElementById('scoreBarWrap');
    const legend   = document.getElementById('scoreLegend');
    const blocked  = document.getElementById('blockedReason');
    const entryTbl = document.getElementById('entryTable');
    const sigPanel = document.querySelector('.col-signal');

    // Clear all state classes
    sigPanel.classList.remove('sig-state-buy','sig-state-sell','sig-state-blocked','sig-state-waiting');

    // News mode override
    if (newsMode || !sig) {
        sigPanel.classList.add('sig-state-waiting');
        statusEl.className  = '';
        statusEl.textContent = '已暂停';
        subEl.textContent    = newsMode ? '消息面模式已开启' : '';
        barWrap.style.display = 'block';
        barFill.style.width   = '0%';
        legend.textContent    = '';
        blocked.style.display = 'none';
        entryTbl.style.display = 'none';
        return;
    }

    const score         = sig.score;
    const aboveThresh   = score >= PRESETS.base.SIG_THRESHOLD;
    const isBlocked     = !sig.risk.pass;
    const fmt           = v => '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2 });

    barFill.style.width = Math.min(100, score) + '%';

    if (isBlocked) {
        // ── BLOCKED ─────────────────────────────────────────
        sigPanel.classList.add('sig-state-blocked');
        statusEl.className   = 'blocked';
        statusEl.textContent = '⊘ 已拦截';
        subEl.textContent    = score + ' / 100 · ' + (sig.direction === 'BUY' ? '做多' : sig.direction === 'SELL' ? '做空' : '中性');
        barWrap.style.display = 'block';
        legend.textContent    = sig.strength;
        blocked.style.display = 'block';
        blocked.textContent   = sig.risk.reason;
        entryTbl.style.display = 'none';
        return;
    }

    blocked.style.display = 'none';

    if (!aboveThresh) {
        // ── WAITING ──────────────────────────────────────────
        sigPanel.classList.add('sig-state-waiting');
        statusEl.className   = '';
        statusEl.textContent = '观望中';
        const tendTxt = sig.direction === 'NEUTRAL' ? '中性' : sig.direction === 'BUY' ? '做多倾向' : '做空倾向';
        subEl.textContent    = tendTxt;
        barWrap.style.display = 'block';
        if (score >= 60 && score < PRESETS.base.SIG_THRESHOLD) {
            legend.innerHTML = '<span style="color:var(--yellow)">⚠ 弱信号 ' + score + ' / 100 — 接近触发阈值</span>';
        } else {
            legend.textContent = score + ' / 100 — 需达到' + PRESETS.base.SIG_THRESHOLD + '分';
        }
        entryTbl.style.display = 'none';
        return;
    }

    // ── SIGNAL (BUY / SELL) ───────────────────────────────────
    const isBuy = sig.direction === 'BUY';
    sigPanel.classList.add(isBuy ? 'sig-state-buy' : 'sig-state-sell');
    statusEl.className   = isBuy ? 'buy' : 'sell';
    statusEl.textContent = isBuy ? '▲ 做多' : '▼ 做空';
    flash(statusEl);
    const strengthColor = score >= 85
        ? (isBuy ? 'var(--green)' : 'var(--red)')
        : 'inherit';
    subEl.innerHTML = '<span style="color:' + strengthColor + ';font-weight:' + (score>=85?'700':'400') + '">'
        + sig.strength + '</span> · ' + score + ' / 100';
    barWrap.style.display = 'none';
    legend.textContent    = '';

    const entryP    = sig.raw.last;
    const stopPrice = isBuy ? sig.stopLong  : sig.stopShort;
    const tpPrice   = isBuy ? sig.tpLong    : sig.tpShort;
    const tpVal     = fmt(tpPrice);
    const tpSub     = '';
    const rrRatio   = sig.rrRatio;
    const slPct     = (Math.abs(entryP - parseFloat(stopPrice)) / entryP * 100).toFixed(1);

    const hist     = loadHistory();
    const resolved = hist.filter(h => h.outcome === 'WIN' || h.outcome === 'LOSS');
    const wins     = resolved.filter(h => h.outcome === 'WIN').length;
    const wrVal    = resolved.length >= 3
        ? (wins / resolved.length * 100).toFixed(0) + '%（' + wins + '/' + resolved.length + '）'
        : resolved.length > 0 ? wins + '/' + resolved.length + '（样本不足）' : '—';

    entryTbl.style.display = 'grid';
    entryTbl.innerHTML =
        row('进场价',   fmt(entryP),                       '')
      + row('目标价',   tpVal + tpSub,                     'tp')
      + row('止损价',   fmt(stopPrice) + ' &nbsp;−' + slPct + '%', 'sl')
      + row('盈亏比',   '1 : ' + rrRatio,                  'rr')
      + (sig.raw.vBottom ? rowFull('V型底', '+10分加成', 'tp') : '')
      + rowFull('历史胜率', wrVal, 'wr');

    function row(label, val, cls) {
        return '<div class="et-row">'
            + '<div class="et-label">' + label + '</div>'
            + '<div class="et-val ' + cls + '">' + val + '</div>'
            + '</div>';
    }
    function rowFull(label, val, cls) {
        return '<div class="et-row">'
            + '<div class="et-label et-full">' + label + '</div>'
            + '<div class="et-val ' + cls + ' et-full">' + val + '</div>'
            + '</div>';
    }
}

/* ================================================================
   MAIN SIGNAL RUN (every 30s)
   ================================================================ */
async function runSignal() {
    if (typeof autoBackfill._ran === 'undefined') {
        autoBackfill._ran = true;
        autoBackfill(); // 后台静默运行，不 await
    }
    if (signalRunning) return;
    signalRunning = true;
    try {
        const [candles, h1Candles] = await Promise.all([fetchOHLC(15), fetchOHLC(60)]);
        const closes  = candles.map(c => c.close);
        const volumes = candles.map(c => c.volume);

        updateOpenSignals(candles);
        const sig = generateSignal(closes, candles, volumes, null, h1Candles);
        renderSignalCard(sig);
        renderInsightCard(sig);
        renderIndicatorPanel(sig);
        updateMktBadge(sig.marketState);
        logSignal(sig);
        renderHistory();
        renderStatusFooter();
    } catch (err) {
        document.getElementById('sfConn').textContent = '数据错误：' + err.message;
    } finally {
        signalRunning = false;
    }
}

function calcPositionSize() {
    const el     = document.getElementById('posResult');
    const equity = parseFloat(document.getElementById('posEquity').value);
    if (!equity || equity <= 0) { el.innerHTML = '输入账户净值后显示建议仓位…'; return; }

    const hist     = loadHistory();
    const resolved = hist.filter(r => r.outcome === 'WIN' || r.outcome === 'LOSS').slice(-20);

    if (resolved.length < 10) {
        el.innerHTML = '历史样本不足，建议固定 <em>1%</em> 仓位（≈ $'
            + (equity * 0.01).toFixed(0) + ')';
        return;
    }

    const wins   = resolved.filter(r => r.outcome === 'WIN');
    const losses = resolved.filter(r => r.outcome === 'LOSS');
    const W      = wins.length / resolved.length;
    const avgW   = wins.length   > 0 ? wins.reduce((s, r)   => s + (r.pnlR || 1), 0) / wins.length   : 1;
    const avgL   = losses.length > 0 ? losses.reduce((s, r) => s + Math.abs(r.pnlR || 1), 0) / losses.length : 1;
    const kelly  = Math.max(0, W - (1 - W) / (avgW / avgL));
    const frac   = kelly * 0.25;

    const priceEl = document.getElementById('tb-price');
    const price   = parseFloat(priceEl ? priceEl.dataset.last : 0) || 0;
    const posUSD  = equity * frac;
    const posBTC  = price > 0 ? posUSD / price : 0;

    const last3 = resolved.slice(-3);
    const streak = last3.length === 3 && last3.every(r => r.outcome === 'LOSS');

    let html = '建议仓位 <em>$' + posUSD.toFixed(0) + '</em>'
        + (posBTC > 0 ? '（≈ <em>' + posBTC.toFixed(4) + ' BTC</em>）' : '')
        + ' — 凯利 ' + (kelly * 100).toFixed(1) + '% × 0.25 保守系数';
    if (streak)
        html += '<br><span class="warn-loss">⚠ 连亏警告，建议减半：$' + (posUSD / 2).toFixed(0) + '</span>';

    el.innerHTML = html;
}

function updateMktBadge(state) {
    const el = document.getElementById('mktBadge');
    if (!el) return;
    el.style.display = '';
    if (state === 'TRENDING_UP') {
        el.className = 'mkt-badge trend-up';
        el.textContent = '趋势↑';
    } else if (state === 'TRENDING_DOWN') {
        el.className = 'mkt-badge trend-dn';
        el.textContent = '趋势↓';
    } else {
        el.className = 'mkt-badge ranging';
        el.textContent = '震荡市';
    }
}

/* ================================================================

   ================================================================ */
function startTimers() {
    if (window._timersStarted) return;
    window._timersStarted = true;
    setInterval(() => {
        tickerCountdown--;
        document.getElementById('nextTicker').textContent = tickerCountdown + 's';
        if (tickerCountdown <= 0) { tickerCountdown = TICKER_INTERVAL; fetchTicker(); }

        signalCountdown--;
        document.getElementById('nextSignal').textContent = signalCountdown + 's';
        if (signalCountdown <= 0) { signalCountdown = SIGNAL_INTERVAL; runSignal(); }
    }, 1000);
}

/* ── 内置回测引擎 ──────────────────────────────────────────── */
const BT_SLIPPAGE = 0.0010;
const BT_FEE      = 0.0026;
const BT_COST     = BT_SLIPPAGE + BT_FEE;

async function btFetchCandles(days) {
  const endTime   = Date.now();
  const startTime = endTime - days * 86400 * 1000;
  const LIMIT     = 100;
  const STEP      = LIMIT * 15 * 60 * 1000;
  let   all       = [];
  let   winStart  = startTime;
  while (winStart < endTime) {
    const winEnd = Math.min(winStart + STEP, endTime);
    const url    = `https://www.okx.com/api/v5/market/history-candles?instId=BTC-USDT&bar=15m&limit=${LIMIT}&after=${winEnd}&before=${winStart}`;
    const resp   = await fetch(url);
    const json   = await resp.json();
    if (json.data && json.data.length) {
      for (const c of json.data) {
        all.push({ time:parseInt(c[0]), open:parseFloat(c[1]), high:parseFloat(c[2]), low:parseFloat(c[3]), close:parseFloat(c[4]), volume:parseFloat(c[5]) });
      }
    }
    winStart = winEnd + 1;
    await new Promise(r => setTimeout(r, 250));
  }
  const seen = new Set();
  all = all.filter(c => seen.has(c.time) ? false : seen.add(c.time));
  all.sort((a, b) => a.time - b.time);
  return all;
}

function btJudgeOutcome(entryTs, direction, entry, sl, candles, cfg) {
  const isBuy   = direction === 'BUY';
  const TRAIL_ACTIVATION = cfg.TRAIL_ACTIVATION ?? 0.5;
  const TRAIL_STEP       = cfg.TRAIL_STEP       ?? 0.35;
  const effEntry  = isBuy ? entry*(1+BT_COST) : entry*(1-BT_COST);
  const slDist    = Math.min(Math.abs(entry-sl), entry*0.012);
  const initSL    = isBuy ? entry-slDist : entry+slDist;
  const effInitSL = isBuy ? initSL*(1-BT_COST) : initSL*(1+BT_COST);
  const R         = Math.abs(effEntry-effInitSL);
  if (R === 0) return { status:'DRAW', pnlR:0 };
  let trailStop = initSL, highWater = entry, trailActive = false;
  const future = candles.filter(c => c.time > entryTs).slice(0, cfg.MAX_HOLD_HOURS*4);
  for (const c of future) {
    if (isBuy) {
      if (c.low <= trailStop) { const e=trailStop*(1-BT_COST); const p=(e-effEntry)/R; return {status:p>=0?'WIN':'LOSS',pnlR:p}; }
      if (c.high > highWater) highWater = c.high;
      const profit = (highWater*(1-BT_COST)-effEntry)/R;
      if (!trailActive && profit >= TRAIL_ACTIVATION) { trailActive=true; const ip=entry-0.2*R; if(ip>trailStop) trailStop=ip; }
      if (trailActive) { const ns=highWater-TRAIL_STEP*R; if(ns>trailStop) trailStop=ns; }
    } else {
      if (c.high >= trailStop) { const e=trailStop*(1+BT_COST); const p=(effEntry-e)/R; return {status:p>=0?'WIN':'LOSS',pnlR:p}; }
      if (c.low < highWater) highWater = c.low;
      const profit = (effEntry-highWater*(1+BT_COST))/R;
      if (!trailActive && profit >= TRAIL_ACTIVATION) { trailActive=true; const ip=entry+0.2*R; if(ip<trailStop) trailStop=ip; }
      if (trailActive) { const ns=highWater+TRAIL_STEP*R; if(ns<trailStop) trailStop=ns; }
    }
  }
  const lp = future.length > 0 ? future[future.length-1].close : entry;
  const exitEff = isBuy ? lp*(1-BT_COST) : lp*(1+BT_COST);
  const pnlR = isBuy ? (exitEff-effEntry)/R : (effEntry-exitEff)/R;
  const status = pnlR >= cfg.TIMEOUT_R_RATIO ? 'WIN' : pnlR <= -cfg.TIMEOUT_R_RATIO ? 'LOSS' : 'DRAW';
  return { status, pnlR };
}

async function runBacktest() {
  const days      = parseInt(document.getElementById('btDays').value);
  const presetKey = document.getElementById('btPreset').value;
  const cfg       = PRESETS[presetKey];
  const btn       = document.getElementById('btRunBtn');
  const log       = document.getElementById('btLog');
  const stats     = document.getElementById('btStats');

  btn.disabled = true;
  btn.textContent = '拉取数据中…';
  stats.style.display = 'none';
  log.innerHTML = '正在从 OKX 拉取 BTC-USDT 15m K线…';

  try {
    const candles = await btFetchCandles(days);
    log.innerHTML += `<br>拉取完成：${candles.length} 根K线，开始回放…<br>`;

    const WARMUP   = 71;
    const DEDUP_MS = 30 * 60 * 1000;
    let lastSigTs  = { BUY: 0, SELL: 0 };
    const results  = [];

    for (let i = WARMUP; i < candles.length - 1; i++) {
      const slice   = candles.slice(0, i+1);
      const closes  = slice.map(c => c.close);
      const volumes = slice.map(c => c.volume);
      const sig     = generateSignal(closes, slice, volumes, cfg);
      if (!sig || sig.score < cfg.SIG_THRESHOLD || !sig.risk.pass) continue;
      const ts = candles[i].time;
      const dir = sig.direction;
      if (ts - lastSigTs[dir] < DEDUP_MS) continue;
      lastSigTs[dir] = ts;
      const stop = dir === 'BUY' ? sig.stopLong : sig.stopShort;
      const res  = btJudgeOutcome(ts, dir, sig.raw.last, parseFloat(stop), candles, cfg);
      results.push({ ts, dir, score: sig.score, price: sig.raw.last, ...res });
      const icon = res.status === 'WIN' ? '<span class="win">✓</span>' : res.status === 'LOSS' ? '<span class="loss">✗</span>' : '<span class="draw">⏸</span>';
      const time = new Date(ts).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
      log.innerHTML += `${icon} [${time}] ${dir} @$${sig.raw.last.toFixed(0)} 分:${sig.score} → ${res.status} (${res.pnlR>=0?'+':''}${res.pnlR.toFixed(2)}R)<br>`;
      log.scrollTop = log.scrollHeight;
    }

    const wins   = results.filter(r => r.status==='WIN');
    const losses = results.filter(r => r.status==='LOSS');
    const total  = wins.length + losses.length;
    const wr     = total > 0 ? wins.length/total : 0;
    const awR    = wins.length   > 0 ? wins.reduce((s,r)=>s+r.pnlR,0)/wins.length   : 0;
    const alR    = losses.length > 0 ? losses.reduce((s,r)=>s+Math.abs(r.pnlR),0)/losses.length : 0;
    const ev     = total > 0 ? wr*awR - (1-wr)*alR : null;

    document.getElementById('btN').textContent  = results.length;
    document.getElementById('btWR').textContent = total > 0 ? (wr*100).toFixed(1)+'%' : '—';
    const evEl = document.getElementById('btEV');
    evEl.textContent = ev != null ? (ev>=0?'+':'')+ev.toFixed(3)+'R' : '—';
    evEl.className   = 'bt-stat-val ' + (ev > 0 ? 'pos' : ev < 0 ? 'neg' : '');
    document.getElementById('btAW').textContent = wins.length   > 0 ? '+'+awR.toFixed(3)+'R' : '—';
    document.getElementById('btAL').textContent = losses.length > 0 ? '-'+alR.toFixed(3)+'R' : '—';
    stats.style.display = 'grid';

    // EV 对比基准
    const BT_BASELINE_KEY = 'bt_baseline_ev';
    const cmpEl  = document.getElementById('btEvCmp');
    const cmpTxt = document.getElementById('btEvCmpText');
    if (ev != null) {
      const baseline = localStorage.getItem(BT_BASELINE_KEY);
      if (baseline === null) {
        localStorage.setItem(BT_BASELINE_KEY, ev.toFixed(4));
        cmpTxt.innerHTML = '首次运行，已记录为基准 <em>' + (ev>=0?'+':'') + ev.toFixed(3) + 'R</em>';
      } else {
        const base = parseFloat(baseline);
        const diff = ev - base;
        const sign = diff >= 0 ? '+' : '';
        const cls  = diff > 0 ? 'pos' : diff < 0 ? 'neg' : '';
        const arr  = diff > 0 ? '↑' : diff < 0 ? '↓' : '→';
        cmpTxt.innerHTML = '基准期望值：<em>' + (base>=0?'+':'') + base.toFixed(3) + 'R</em>'
          + ' → 当前：<em>' + (ev>=0?'+':'') + ev.toFixed(3) + 'R</em>'
          + '　变化：<em class="' + cls + '">' + sign + diff.toFixed(3) + 'R ' + arr + '</em>';
      }
      cmpEl.style.display = 'flex';
    }

    log.innerHTML += `<br>─── 完成 [${cfg.name}] ─── 信号:${results.length} WIN:${wins.length} LOSS:${losses.length} 胜率:${total>0?(wr*100).toFixed(1)+'%':'—'} 期望:${ev!=null?(ev>=0?'+':'')+ev.toFixed(3)+'R':'—'}`;
    log.scrollTop = log.scrollHeight;

  } catch(err) {
    log.innerHTML += `<br><span class="loss">错误：${err.message}</span>`;
  } finally {
    btn.disabled    = false;
    btn.textContent = '▶ 运行回测';
  }
}

function btResetBaseline() {
  localStorage.removeItem('bt_baseline_ev');
  const cmpEl = document.getElementById('btEvCmp');
  if (cmpEl) cmpEl.style.display = 'none';
}</script>
