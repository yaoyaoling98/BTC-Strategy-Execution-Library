<script>
/* ════════════════════════════════════════════════════════════
   配置（与 btc-signal-v2.html 保持一致）
   ════════════════════════════════════════════════════════════ */
const PRESETS = {
  base: {
    name: '基准',
    EMA_SHORT: 20, EMA_LONG: 50,
    STOP_LOSS_PCT: 0.015, TAKE_PROFIT_PCT: 0.020,
    SIG_THRESHOLD: 70,
    ATR_SL_MULT: 1.0, ATR_TP_MULT: 1.5,
    ADX_MIN: 15, ADX_MID: 20, ADX_MID_SCORE: 80,
    ENTRY_DISTANCE_PCT: 0,
    MAX_HOLD_HOURS: 24, TIMEOUT_R_RATIO: 0.5,
    TRAIL_ACTIVATION: 0.5, TRAIL_STEP: 0.35,
  },
  A: {
    name: 'A组高胜率',
    EMA_SHORT: 20, EMA_LONG: 50,
    STOP_LOSS_PCT: 0.015, TAKE_PROFIT_PCT: 0.020,
    SIG_THRESHOLD: 78,
    ATR_SL_MULT: 1.7, ATR_TP_MULT: 1.1,
    ADX_MIN: 15, ADX_MID: 20, ADX_MID_SCORE: 80,
    ENTRY_DISTANCE_PCT: 0.0015,
    MAX_HOLD_HOURS: 24, TIMEOUT_R_RATIO: 0.5,
    TRAIL_ACTIVATION: 0.5, TRAIL_STEP: 0.35,
  },
  B: {
    name: 'B组平衡',
    EMA_SHORT: 20, EMA_LONG: 50,
    STOP_LOSS_PCT: 0.015, TAKE_PROFIT_PCT: 0.020,
    SIG_THRESHOLD: 75,
    ATR_SL_MULT: 1.6, ATR_TP_MULT: 1.3,
    ADX_MIN: 18, ADX_MID: 25, ADX_MID_SCORE: 75,
    ENTRY_DISTANCE_PCT: 0.0015,
    MAX_HOLD_HOURS: 24, TIMEOUT_R_RATIO: 0.5,
    TRAIL_ACTIVATION: 0.5, TRAIL_STEP: 0.35,
  },
  C: {
    name: 'C组保守',
    EMA_SHORT: 20, EMA_LONG: 50,
    STOP_LOSS_PCT: 0.015, TAKE_PROFIT_PCT: 0.020,
    SIG_THRESHOLD: 75,
    ATR_SL_MULT: 1.0, ATR_TP_MULT: 1.5,
    ADX_MIN: 15, ADX_MID: 20, ADX_MID_SCORE: 80,
    ENTRY_DISTANCE_PCT: 0,
    MAX_HOLD_HOURS: 24, TIMEOUT_R_RATIO: 0.5,
    TRAIL_ACTIVATION: 0.5, TRAIL_STEP: 0.35,
  },
};
// backfill-specific constants
const CFG      = { EOD_HOUR_UTC: 22, DEDUP_MINUTES: 30 };
const SLIPPAGE = 0.0010; // 0.10% BTC大单保守滑点
const FEE      = 0.0026; // 0.26% Kraken taker 真实费率
const COST     = SLIPPAGE + FEE; // 单边总成本 0.36%
const HISTORY_KEY = 'btc_signal_history';

/* ════════════════════════════════════════════════════════════
   OKX 数据拉取（固定时间窗口切片，每次100根×15min）
   ════════════════════════════════════════════════════════════ */
async function fetchAllCandles(days) {
  const endTime   = Date.now();
  const startTime = endTime - days * 86400 * 1000;
  const LIMIT     = 100;
  const STEP      = LIMIT * 15 * 60 * 1000; // 100根 × 15分钟
  let   all       = [];
  let   winStart  = startTime;

  log(`正在拉取 OKX 15m K线（过去 ${days} 天）...`);

  while (winStart < endTime) {
    const winEnd = Math.min(winStart + STEP, endTime);
    const url = `https://www.okx.com/api/v5/market/history-candles?instId=BTC-USDT&bar=15m&limit=${LIMIT}&after=${winEnd}&before=${winStart}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error('OKX API ' + resp.status);
    const json = await resp.json();

    if (json.data && json.data.length) {
      const candles = json.data.map(c => ({
        time:   parseInt(c[0]),
        open:   parseFloat(c[1]),
        high:   parseFloat(c[2]),
        low:    parseFloat(c[3]),
        close:  parseFloat(c[4]),
        volume: parseFloat(c[5]),
      }));
      all = all.concat(candles);
      log(`  已获取 ${all.length} 根...`);
    }

    winStart = winEnd + 1;
    await sleep(300);
  }

  const seen = new Set();
  all = all.filter(c => seen.has(c.time) ? false : seen.add(c.time));
  all.sort((a, b) => a.time - b.time);
  log(`数据拉取完成，共 ${all.length} 根 K线\n`);
  return all;
}

/* ════════════════════════════════════════════════════════════
   指标计算（与 btc-signal-v2.html 完全一致）
   ════════════════════════════════════════════════════════════ */
function calcRSI(closes, period = 14) {
  if (closes.length < period + 1) return null;
  let ag = 0, al = 0;
  for (let i = 1; i <= period; i++) {
    const d = closes[i] - closes[i-1];
    if (d > 0) ag += d; else al += Math.abs(d);
  }
  ag /= period; al /= period;
  for (let i = period + 1; i < closes.length; i++) {
    const d = closes[i] - closes[i-1];
    ag = (ag * (period-1) + (d > 0 ? d : 0)) / period;
    al = (al * (period-1) + (d < 0 ? Math.abs(d) : 0)) / period;
  }
  const rs = al === 0 ? 100 : ag / al;
  return 100 - 100 / (1 + rs);
}

function calcBB(closes, period = 20, mult = 2) {
  if (closes.length < period) return null;
  const sl  = closes.slice(-period);
  const mid = sl.reduce((s, v) => s + v, 0) / period;
  const std = Math.sqrt(sl.reduce((s, v) => s + (v - mid) ** 2, 0) / period);
  const upper = mid + mult * std, lower = mid - mult * std;
  const last  = closes[closes.length - 1];
  const pct   = upper !== lower ? (last - lower) / (upper - lower) : 0.5;
  return { upper, middle: mid, lower, pct };
}

function calcEMA(closes, period) {
  if (closes.length < period) return closes[closes.length - 1];
  const k = 2 / (period + 1);
  let ema = closes.slice(0, period).reduce((s, v) => s + v, 0) / period;
  for (let i = period; i < closes.length; i++) ema = closes[i] * k + ema * (1 - k);
  return ema;
}

function calcVWAP(candles) {
  const todayStart = (() => {
    const last = new Date(candles[candles.length-1].time);
    return Date.UTC(last.getUTCFullYear(), last.getUTCMonth(), last.getUTCDate());
  })();
  let cv = 0, cv2 = 0;
  for (const c of candles) {
    if (c.time < todayStart) continue;
    const tp = (c.high + c.low + c.close) / 3;
    cv += tp * c.volume; cv2 += c.volume;
  }
  return cv2 > 0 ? cv / cv2 : null;
}

function calcMFI(candles, period = 14) {
  if (candles.length < period + 1) return 50;
  const sl = candles.slice(-(period + 1));
  let pos = 0, neg = 0;
  for (let i = 1; i <= period; i++) {
    const tp  = (sl[i].high   + sl[i].low   + sl[i].close)   / 3;
    const tpP = (sl[i-1].high + sl[i-1].low + sl[i-1].close) / 3;
    const mf  = tp * sl[i].volume;
    if (tp > tpP) pos += mf; else if (tp < tpP) neg += mf;
  }
  return neg === 0 ? 100 : 100 - 100 / (1 + pos / neg);
}

function calcVolRatio(volumes, period = 20) {
  if (volumes.length < period + 1) return 1;
  const avg = volumes.slice(-period-1, -1).reduce((s, v) => s + v, 0) / period;
  return avg > 0 ? volumes[volumes.length-1] / avg : 1;
}

function calcADX(candles, period) {
  period = period || 14;
  if (candles.length < period * 2) return null;
  const trs = [], plusDMs = [], minusDMs = [];
  for (let i = 1; i < candles.length; i++) {
    const h = candles[i].high, l = candles[i].low;
    const ph = candles[i-1].high, pl = candles[i-1].low, pc = candles[i-1].close;
    trs.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));
    const upMove = h-ph, downMove = pl-l;
    plusDMs.push(upMove > downMove && upMove > 0 ? upMove : 0);
    minusDMs.push(downMove > upMove && downMove > 0 ? downMove : 0);
  }
  const smooth = arr => {
    let s = arr.slice(0, period).reduce((a,b)=>a+b,0);
    const r = [s];
    for (let i = period; i < arr.length; i++) { s = s - s/period + arr[i]; r.push(s); }
    return r;
  };
  const sTR = smooth(trs), sPDM = smooth(plusDMs), sMDM = smooth(minusDMs);
  const DIs = sTR.map((tr,i) => ({
    plus:  tr ? 100*sPDM[i]/tr : 0,
    minus: tr ? 100*sMDM[i]/tr : 0,
  }));
  const DXs = DIs.map(d => {
    const s = d.plus + d.minus;
    return s ? 100*Math.abs(d.plus-d.minus)/s : 0;
  });
  let adx = DXs.slice(0, period).reduce((a,b)=>a+b,0)/period;
  for (let i = period; i < DXs.length; i++) adx = (adx*(period-1)+DXs[i])/period;
  return { adx, plusDI: DIs[DIs.length-1].plus, minusDI: DIs[DIs.length-1].minus };
}

function calcATR(candles, period) {
  period = period || 14;
  if (candles.length < period + 1) return null;
  const trs = [];
  for (let i = 1; i < candles.length; i++) {
    const h = candles[i].high, l = candles[i].low, pc = candles[i-1].close;
    trs.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
  }
  let atr = trs.slice(0, period).reduce((a, b) => a + b, 0) / period;
  for (let i = period; i < trs.length; i++) atr = (atr * (period - 1) + trs[i]) / period;
  return atr;
}

function detectVBottom(candles) {
  if (candles.length < 6) return false;
  const avg = candles.slice(-6).map(c => (c.open+c.high+c.low+c.close)/4);
  for (let i = 0; i < 4; i++) if (avg[i] <= avg[i+1]) return false;
  return avg[5] > avg[4];
}

/* ════════════════════════════════════════════════════════════
   打分系统
   ════════════════════════════════════════════════════════════ */
function scoreRSI(v) {
  if (v===null) return {score:0,vote:0};
  if (v<=20) return {score:25,vote:+1}; if (v<=30) return {score:20,vote:+1};
  if (v<=38) return {score:10,vote:+1}; if (v<=45) return {score:4,vote:+1};
  if (v<55)  return {score:0,vote:0};
  if (v<62)  return {score:4,vote:-1};  if (v<70)  return {score:10,vote:-1};
  if (v<80)  return {score:20,vote:-1}; return {score:25,vote:-1};
}
function scoreBB(p) {
  if (p<=0)   return {score:25,vote:+1}; if (p<=.1)  return {score:22,vote:+1};
  if (p<=.2)  return {score:16,vote:+1}; if (p<=.35) return {score:7,vote:+1};
  if (p<=.65) return {score:0,vote:0};
  if (p<=.8)  return {score:7,vote:-1};  if (p<=.9)  return {score:16,vote:-1};
  if (p<=1.0) return {score:22,vote:-1}; return {score:25,vote:-1};
}
function scoreVWAP(dev) {
  const a=Math.abs(dev), v=dev<0?+1:dev>0?-1:0;
  const s=a>=2?25:a>=1.2?20:a>=.6?14:a>=.3?7:2;
  return {score:s,vote:v};
}
function scoreMFI(m) {
  if (m<=20) return {score:25,vote:+1}; if (m<=30) return {score:20,vote:+1};
  if (m<=38) return {score:10,vote:+1}; if (m<=45) return {score:4,vote:+1};
  if (m<55)  return {score:0,vote:0};
  if (m<62)  return {score:4,vote:-1};  if (m<70)  return {score:10,vote:-1};
  if (m<80)  return {score:20,vote:-1}; return {score:25,vote:-1};
}

/* ════════════════════════════════════════════════════════════
   信号生成（回放模式，无消息面过滤）
   ════════════════════════════════════════════════════════════ */
function generateSignalAt(candles, idx, cfg) {
  cfg = cfg || PRESETS.base;
  const slice   = candles.slice(0, idx + 1);
  const closes  = slice.map(c => c.close);
  const volumes = slice.map(c => c.volume);
  const last    = closes[closes.length - 1];

  const rsi = calcRSI(closes);
  const bb  = calcBB(closes);
  const vwap= calcVWAP(slice);
  const ema20 = calcEMA(closes, cfg.EMA_SHORT);
  const ema50 = calcEMA(closes, cfg.EMA_LONG);
  const mfi   = calcMFI(slice);
  const volR  = calcVolRatio(volumes);

  // 异常成交量硬过滤
  const vol30avg = volumes.length >= 31
    ? volumes.slice(-31,-1).reduce((s,v)=>s+v,0)/30 : 0;
  if (vol30avg > 0 && volumes[volumes.length-1] > vol30avg * 20) return null;

  const rsiR  = scoreRSI(rsi);
  const bbR   = scoreBB(bb ? bb.pct : 0.5);
  const vwapR = vwap ? scoreVWAP((last - vwap) / vwap * 100) : {score:0,vote:0};
  const mfiR  = scoreMFI(mfi);
  const vBonus = detectVBottom(slice) ? 10 : 0;
  const total  = Math.min(100, rsiR.score + bbR.score + vwapR.score + mfiR.score + vBonus);

  const votes = rsiR.vote + bbR.vote + vwapR.vote + mfiR.vote;
  const dir   = votes > 0 ? 'BUY' : votes < 0 ? 'SELL' : null;
  if (!dir || total < cfg.SIG_THRESHOLD) return null;

  // EMA风控
  if (dir === 'BUY'  && ema20 < ema50) return null;
  if (dir === 'SELL' && ema20 > ema50) return null;

  // ADX 趋势强度过滤（与主面板一致）
  const adxData = calcADX(slice);
  if (adxData && adxData.adx < cfg.ADX_MIN) return null;

  // ATR 动态止损（与主面板保持一致）
  const atr = calcATR(slice);
  let stop, bbTarget;
  if (atr) {
    const slDist = Math.min(Math.max(atr * cfg.ATR_SL_MULT, last * 0.008), last * 0.03);
    const tpDist = slDist * (cfg.ATR_TP_MULT / cfg.ATR_SL_MULT);
    stop     = dir === 'BUY' ? last - slDist : last + slDist;
    bbTarget = dir === 'BUY' ? last + tpDist : last - tpDist;
  } else {
    stop     = dir === 'BUY' ? last*(1-cfg.STOP_LOSS_PCT) : last*(1+cfg.STOP_LOSS_PCT);
    bbTarget = dir === 'BUY' ? last*(1+cfg.TAKE_PROFIT_PCT) : last*(1-cfg.TAKE_PROFIT_PCT);
  }

  return {
    direction: dir,
    score:     total,
    price:     last,
    stop,
    bbTarget,
    strength:  total >= 85 ? '强信号' : '弱信号',
    rsi:       rsi ? rsi.toFixed(1) : '--',
    bbPct:     bb  ? (bb.pct*100).toFixed(1)+'%' : '--',
    emaTrend:  ema20 > ema50 ? '多头' : '空头',
  };
}

/* ════════════════════════════════════════════════════════════
   胜负判定：跟踪止损（移除固定TP，让利润奔跑）
   返回 { status: 'WIN'|'LOSS'|'DRAW', pnlR, closePrice, closeTs }

   R 定义（双边成本完全统一）：
     effEntry  = entry * (1±COST)          — 入场含成本
     effInitSL = initSL * (1∓COST)         — 止损含出场成本
     R         = |effEntry - effInitSL|    — 固定单位，全程不变

   trailStop / highWater：市场价（直接与OHLC比较）
   pnlR 计算：exit 时对称扣成本，不多不少
   单调性约束：trailStop 做多只能上移，做空只能下移
   ════════════════════════════════════════════════════════════ */
function judgeOutcome(entryTs, direction, entry, sl, tp, candles, cfg) {
  const isBuy = direction === 'BUY';
  const TRAIL_ACTIVATION = cfg.TRAIL_ACTIVATION ?? 0.5;
  const TRAIL_STEP       = cfg.TRAIL_STEP       ?? 0.35;

  // 入场含成本（对称成本第一端）
  const effEntry = isBuy ? entry * (1 + COST) : entry * (1 - COST);

  // 止损上限 1.2%，得到市场价止损位
  const maxSLDist = entry * 0.012;
  const slDist    = Math.min(Math.abs(entry - sl), maxSLDist);
  const initSL    = isBuy ? entry - slDist : entry + slDist;  // 市场价

  // R 基于有效价格（入场+出场两端成本均已计入）
  const effInitSL = isBuy ? initSL * (1 - COST) : initSL * (1 + COST);
  const R         = Math.abs(effEntry - effInitSL);
  if (R === 0) return { status: 'DRAW', pnlR: 0, closePrice: entry, closeTs: entryTs };

  // trailStop / highWater 均为市场价（用于OHLC比较）
  let trailStop  = initSL;
  let highWater  = entry;
  let trailActive = false;

  const future = candles.filter(c => c.time > entryTs).slice(0, cfg.MAX_HOLD_HOURS * 4);

  for (const c of future) {
    if (isBuy) {
      // Step A：止损优先，同一根K线SL和新高同触发 → 保守记止损
      if (c.low <= trailStop) {
        const exitEff = trailStop * (1 - COST);   // 出场含成本（对称第二端）
        const pnlR    = (exitEff - effEntry) / R;
        return { status: pnlR >= 0 ? 'WIN' : 'LOSS', pnlR, closePrice: trailStop, closeTs: c.time };
      }
      // Step B：更新最高市场价
      if (c.high > highWater) highWater = c.high;
      // Step D：激活检测（用有效价计算盈利倍数）
      const effHigh = highWater * (1 - COST);
      const profit  = (effHigh - effEntry) / R;
      if (!trailActive && profit >= TRAIL_ACTIVATION) {
        trailActive = true;
        // 激活时推进到 entry - 0.2*R（市场价近似，仅单调上移）
        const initPush = entry - 0.2 * R;
        if (initPush > trailStop) trailStop = initPush;
      }
      // Step C：跟踪上移（单调性：只能上移）
      if (trailActive) {
        const newStop = highWater - TRAIL_STEP * R;
        if (newStop > trailStop) trailStop = newStop;
      }
    } else {
      // Step A
      if (c.high >= trailStop) {
        const exitEff = trailStop * (1 + COST);
        const pnlR    = (effEntry - exitEff) / R;
        return { status: pnlR >= 0 ? 'WIN' : 'LOSS', pnlR, closePrice: trailStop, closeTs: c.time };
      }
      // Step B
      if (c.low < highWater) highWater = c.low;
      // Step D
      const effLow = highWater * (1 + COST);
      const profit = (effEntry - effLow) / R;
      if (!trailActive && profit >= TRAIL_ACTIVATION) {
        trailActive = true;
        const initPush = entry + 0.2 * R;
        if (initPush < trailStop) trailStop = initPush;
      }
      // Step C（单调：只能下移）
      if (trailActive) {
        const newStop = highWater + TRAIL_STEP * R;
        if (newStop < trailStop) trailStop = newStop;
      }
    }
  }

  // 超时：出场也含成本
  const lastPrice = future.length > 0 ? future[future.length - 1].close : entry;
  const exitEff   = isBuy ? lastPrice * (1 - COST) : lastPrice * (1 + COST);
  const pnlR      = isBuy ? (exitEff - effEntry) / R : (effEntry - exitEff) / R;
  const status    = pnlR >= cfg.TIMEOUT_R_RATIO ? 'WIN' : pnlR <= -cfg.TIMEOUT_R_RATIO ? 'LOSS' : 'DRAW';
  return { status, pnlR, closePrice: lastPrice, closeTs: entryTs + cfg.MAX_HOLD_HOURS * 3600 * 1000 };
}

/* ════════════════════════════════════════════════════════════
   主回放逻辑
   ════════════════════════════════════════════════════════════ */
let resultJson = [];

// 基准回放结果（用于与其他参数组对比）
let baseResultJson = null;

async function startBackfill() {
  const days       = parseInt(document.getElementById('days').value);
  const presetKey  = document.getElementById('preset-select').value;
  const cfg        = PRESETS[presetKey];
  document.getElementById('output-area').style.display = 'none';
  document.getElementById('log').textContent = '';
  resultJson = [];

  try {
    const candles = await fetchAllCandles(days);
    const WARMUP  = Math.max(14, 50, 20, 14) + 20 + 1;

    log(`开始回放 [${cfg.name}]（预热期 ${WARMUP} 根）...`);

    let lastSigTs = { BUY: 0, SELL: 0 };
    let sigCount  = 0;

    // 收集R倍数（用于期望值计算）
    const winRList  = [];
    const lossRList = [];

    for (let i = WARMUP; i < candles.length - 1; i++) {
      const sig = generateSignalAt(candles, i, cfg);
      if (!sig) continue;

      const ts = candles[i].time;
      if (ts - lastSigTs[sig.direction] < CFG.DEDUP_MINUTES * 60 * 1000) continue;
      lastSigTs[sig.direction] = ts;

      const res = judgeOutcome(ts, sig.direction, sig.price, sig.stop, sig.bbTarget, candles, cfg);
      const timeStr = new Date(ts).toLocaleString('zh-CN', {
        month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
      });

      sigCount++;
      const icon = res.status === 'WIN' ? '✓' : res.status === 'LOSS' ? '✗' : '⏸';
      log(`[${timeStr}] ${sig.direction} @$${sig.price.toFixed(0)} 分:${sig.score} → ${icon} ${res.status}  (${res.pnlR >= 0 ? '+' : ''}${res.pnlR.toFixed(2)}R)`);

      const isBuyDir = sig.direction === 'BUY';
      const effEntry = isBuyDir ? sig.price * (1 + COST) : sig.price * (1 - COST);
      const effStop  = isBuyDir ? sig.stop  * (1 - COST) : sig.stop  * (1 + COST);

      if (res.status === 'WIN')  winRList.push(res.pnlR);
      if (res.status === 'LOSS') lossRList.push(Math.abs(res.pnlR));

      resultJson.push({
        ts,
        time:      timeStr,
        direction: sig.direction,
        strength:  sig.strength,
        score:     sig.score,
        price:     effEntry.toFixed(2),
        stop:      effStop.toFixed(2),
        bbTarget:  null,  // 跟踪止损无固定TP
        rsi:       sig.rsi,
        bbPct:     sig.bbPct,
        emaTrend:  sig.emaTrend,
        outcome:   res.status,
        pnlR:      parseFloat(res.pnlR.toFixed(3)),
      });
    }

    const wins   = resultJson.filter(s => s.outcome === 'WIN').length;
    const losses = resultJson.filter(s => s.outcome === 'LOSS').length;
    const draws  = resultJson.filter(s => s.outcome === 'DRAW').length;
    const total  = wins + losses;
    const wr     = total > 0 ? wins / total : 0;
    const wrPct  = total > 0 ? (wr * 100).toFixed(1) : '--';

    const avgWinR  = winRList.length  > 0 ? winRList.reduce((a,b)=>a+b,0)  / winRList.length  : 0;
    const avgLossR = lossRList.length > 0 ? lossRList.reduce((a,b)=>a+b,0) / lossRList.length : 1;
    const maxWinR  = winRList.length  > 0 ? Math.max(...winRList) : 0;
    const maxLossR = lossRList.length > 0 ? Math.max(...lossRList) : 0;
    const ev       = total > 0 ? wr * avgWinR - (1 - wr) * avgLossR : null;
    const evSign   = ev != null ? (ev > 0 ? '✅ 正期望' : '❌ 负期望') : '';

    log(`\n${'─'.repeat(50)}`);
    log(`回放完成 [${cfg.name}]：共 ${sigCount} 笔信号`);
    log(`已结算：WIN ${wins}  LOSS ${losses}  DRAW ${draws}  胜率 ${wrPct}%`);
    log(`平均盈利R：+${avgWinR.toFixed(2)}  平均亏损R：-${avgLossR.toFixed(2)}`);
    log(`最大单笔盈利R：+${maxWinR.toFixed(2)}  最大单笔亏损R：-${maxLossR.toFixed(2)}${maxLossR > 1.1 ? '  ⚠️ 超过1.1R，检查SL宽度' : ''}`);
    log(`期望值：${ev != null ? (ev >= 0 ? '+' : '') + ev.toFixed(3) : '--'} R  ${evSign}`);
    log(`单边成本：滑点${(SLIPPAGE*100).toFixed(2)}% + 手续费${(FEE*100).toFixed(2)}% = ${(COST*100).toFixed(2)}%（含止损）`);
    log(`跟踪参数：激活=${cfg.TRAIL_ACTIVATION}R  步长=${cfg.TRAIL_STEP}R  超时=${cfg.MAX_HOLD_HOURS}h`);

    // 与基准对比
    if (presetKey === 'base') {
      baseResultJson = { sigCount, total, wr, wrPct, ev };
    } else if (baseResultJson) {
      const dSig = sigCount - baseResultJson.sigCount;
      const dWR  = total > 0 && baseResultJson.total > 0
        ? ((wr - baseResultJson.wr) * 100).toFixed(1)
        : '--';
      const dEV  = ev != null && baseResultJson.ev != null
        ? (ev - baseResultJson.ev).toFixed(3)
        : '--';
      log(`\n— 与基准对比 —`);
      log(`信号数：${dSig >= 0 ? '+' : ''}${dSig}  胜率：${dWR >= 0 ? '+' : ''}${dWR}%  期望值：${dEV >= 0 ? '+' : ''}${dEV}R`);
    }

    if (sigCount === 0) {
      log(`\n⚠ 零信号——可能原因：OKX API 访问失败，请检查网络连接，或回溯天数太短。`);
      log(`  建议：检查网络连接后重试，或增加回溯天数。`);
    } else {
      document.getElementById('json-out').value = JSON.stringify(resultJson, null, 2);
      document.getElementById('output-area').style.display = 'block';
    }

  } catch (e) {
    log(`\n❌ 错误：${e.message}`);
    log(`提示：OKX API 访问失败，请检查网络连接后重试。`);
  }
}

function injectToStorage() {
  if (!resultJson.length) { alert('没有数据可写入'); return; }
  const existing = (() => {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
  })();
  // 合并去重（按 ts 去重）
  const merged = [...existing, ...resultJson]
    .sort((a, b) => a.ts - b.ts)
    .filter((v, i, arr) => i === 0 || arr[i-1].ts !== v.ts)
    .slice(-200);  // 最多保留200条（与主面板一致）
  localStorage.setItem(HISTORY_KEY, JSON.stringify(merged));
  alert(`✓ 已写入 localStorage：${merged.length} 条记录（含原有 ${existing.length} 条）`);
}

function copyJson() {
  navigator.clipboard.writeText(document.getElementById('json-out').value)
    .then(() => {
      const tip = document.getElementById('copy-tip');
      tip.style.display = 'inline';
      setTimeout(() => { tip.style.display = 'none'; }, 2000);
    });
}

function clearLog() {
  document.getElementById('log').textContent = '';
}

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
