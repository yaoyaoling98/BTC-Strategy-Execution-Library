<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>BTC信号历史回放 — OKX冷启动工具</title>
<style>
  body { background:#0d1117; color:#c9d1d9; font-family:monospace; padding:24px; max-width:900px; margin:0 auto; }
  h2   { color:#f7931a; margin-bottom:4px; }
  p    { color:#8b949e; margin:4px 0 16px; }
  .row { display:flex; gap:12px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
  select,button { background:#161b22; color:#c9d1d9; border:1px solid #30363d; padding:8px 14px;
                  border-radius:6px; cursor:pointer; font-size:13px; }
  button:hover  { background:#21262d; }
  button.primary{ background:#f7931a; color:#000; font-weight:700; border-color:#f7931a; }
  button.green  { background:#26a69a; color:#fff; border-color:#26a69a; }
  #log  { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:16px;
          min-height:200px; white-space:pre-wrap; font-size:12px; line-height:1.6;
          max-height:400px; overflow-y:auto; }
  #json-out { width:100%; background:#161b22; border:1px solid #30363d; border-radius:8px;
              padding:12px; font-size:11px; color:#8b949e; min-height:100px;
              box-sizing:border-box; margin-top:12px; }
  .ok  { color:#26a69a; } .err { color:#ef5350; } .warn { color:#f7931a; }
  .num { color:#79c0ff; }
</style>
</head>
<body>

<h2>📊 BTC信号历史回放 — 冷启动工具</h2>
<p>从 OKX 拉取 BTC-USDT 历史K线，用当前策略逻辑回放信号，自动判定胜负，写入 localStorage</p>

<div class="row">
  <label>回溯天数：</label>
  <select id="days">
    <option value="30">30天（≈2880根K线，预计3-8笔信号）</option>
    <option value="60">60天（≈5760根，预计6-15笔）</option>
    <option value="90" selected>90天（≈8640根，预计10-25笔，推荐）</option>
  </select>
  <label style="margin-left:16px">参数组：</label>
  <select id="preset-select">
    <option value="base">基准版本</option>
    <option value="A">A组：高胜率型</option>
    <option value="B">B组：平衡型</option>
    <option value="C">C组：保守型</option>
  </select>
  <button class="primary" onclick="startBackfill()">▶ 开始回放</button>
  <button onclick="clearLog()">清空日志</button>
</div>

<div id="log">点击"开始回放"拉取数据并运行策略回放...</div>

<div id="output-area" style="display:none">
  <div class="row" style="margin-top:16px">
    <button class="green" onclick="injectToStorage()">💾 直接写入 localStorage（当前页面）</button>
    <button onclick="copyJson()">📋 复制 JSON</button>
    <span id="copy-tip" style="color:#26a69a;display:none">✓ 已复制</span>
  </div>
  <textarea id="json-out" readonly placeholder="回放完成后这里会显示 JSON..."></textarea>
</div>

<script type="module">
/* 所有策略函数从 backtest_core.mjs 单源导入，禁止在此重复定义 */
import {
  PRESETS, SLIPPAGE, FEE, COST, CFG,
  calcRSI, calcBB, calcEMA, calcVWAP, calcMFI, calcVolRatio,
  calcADX, calcATR, detectVBottom,
  scoreRSI, scoreBB, scoreVWAP, scoreMFI,
  generateSignalAt, judgeOutcome,
} from './backtest_core.mjs';

const HISTORY_KEY = 'btc_signal_history';


/* ════════════════════════════════════════════════════════════
   主回放逻辑
   ════════════════════════════════════════════════════════════ */
let resultJson = [];

// 基准回放结果（用于与其他参数组对比）
let baseResultJson = null;

async function startBackfill() {
  const days       = parseInt(document.getElementById('days').value);
  const presetKey  = document.getElementById('preset-select').value;
  const cfg        = PRESETS[presetKey];
  document.getElementById('output-area').style.display = 'none';
  document.getElementById('log').textContent = '';
  resultJson = [];

  try {
    const candles = await fetchAllCandles(days);
    const WARMUP  = Math.max(14, 50, 20, 14) + 20 + 1;

    log(`开始回放 [${cfg.name}]（预热期 ${WARMUP} 根）...`);

    let lastSigTs = { BUY: 0, SELL: 0 };
    let sigCount  = 0;

    // 收集R倍数（用于期望值计算）
    const winRList  = [];
    const lossRList = [];

    for (let i = WARMUP; i < candles.length - 1; i++) {
      const sig = generateSignalAt(candles, i, cfg);
      if (!sig) continue;

      const ts = candles[i].time;
      if (ts - lastSigTs[sig.direction] < CFG.DEDUP_MINUTES * 60 * 1000) continue;
      lastSigTs[sig.direction] = ts;

      const res = judgeOutcome(ts, sig.direction, sig.price, sig.stop, sig.bbTarget, candles, cfg);
      const timeStr = new Date(ts).toLocaleString('zh-CN', {
        month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
      });

      sigCount++;
      const icon = res.status === 'WIN' ? '✓' : res.status === 'LOSS' ? '✗' : '⏸';
      log(`[${timeStr}] ${sig.direction} @$${sig.price.toFixed(0)} 分:${sig.score} → ${icon} ${res.status}  (${res.pnlR >= 0 ? '+' : ''}${res.pnlR.toFixed(2)}R)`);

      const isBuyDir = sig.direction === 'BUY';
      const effEntry = isBuyDir ? sig.price * (1 + COST) : sig.price * (1 - COST);
      const effStop  = isBuyDir ? sig.stop  * (1 - COST) : sig.stop  * (1 + COST);

      if (res.status === 'WIN')  winRList.push(res.pnlR);
      if (res.status === 'LOSS') lossRList.push(Math.abs(res.pnlR));

      resultJson.push({
        ts,
        time:      timeStr,
        direction: sig.direction,
        strength:  sig.strength,
        score:     sig.score,
        price:     effEntry.toFixed(2),
        stop:      effStop.toFixed(2),
        bbTarget:  null,  // 跟踪止损无固定TP
        rsi:       sig.rsi,
        bbPct:     sig.bbPct,
        emaTrend:  sig.emaTrend,
        outcome:   res.status,
        pnlR:      parseFloat(res.pnlR.toFixed(3)),
      });
    }

    const wins   = resultJson.filter(s => s.outcome === 'WIN').length;
    const losses = resultJson.filter(s => s.outcome === 'LOSS').length;
    const draws  = resultJson.filter(s => s.outcome === 'DRAW').length;
    const total  = wins + losses;
    const wr     = total > 0 ? wins / total : 0;
    const wrPct  = total > 0 ? (wr * 100).toFixed(1) : '--';

    const avgWinR  = winRList.length  > 0 ? winRList.reduce((a,b)=>a+b,0)  / winRList.length  : 0;
    const avgLossR = lossRList.length > 0 ? lossRList.reduce((a,b)=>a+b,0) / lossRList.length : 1;
    const maxWinR  = winRList.length  > 0 ? Math.max(...winRList) : 0;
    const maxLossR = lossRList.length > 0 ? Math.max(...lossRList) : 0;
    const ev       = total > 0 ? wr * avgWinR - (1 - wr) * avgLossR : null;
    const evSign   = ev != null ? (ev > 0 ? '✅ 正期望' : '❌ 负期望') : '';

    log(`\n${'─'.repeat(50)}`);
    log(`回放完成 [${cfg.name}]：共 ${sigCount} 笔信号`);
    log(`已结算：WIN ${wins}  LOSS ${losses}  DRAW ${draws}  胜率 ${wrPct}%`);
    log(`平均盈利R：+${avgWinR.toFixed(2)}  平均亏损R：-${avgLossR.toFixed(2)}`);
    log(`最大单笔盈利R：+${maxWinR.toFixed(2)}  最大单笔亏损R：-${maxLossR.toFixed(2)}${maxLossR > 1.1 ? '  ⚠️ 超过1.1R，检查SL宽度' : ''}`);
    log(`期望值：${ev != null ? (ev >= 0 ? '+' : '') + ev.toFixed(3) : '--'} R  ${evSign}`);
    log(`单边成本：滑点${(SLIPPAGE*100).toFixed(2)}% + 手续费${(FEE*100).toFixed(2)}% = ${(COST*100).toFixed(2)}%（含止损）`);
    log(`跟踪参数：激活=${cfg.TRAIL_ACTIVATION}R  步长=${cfg.TRAIL_STEP}R  超时=${cfg.MAX_HOLD_HOURS}h`);

    // 与基准对比
    if (presetKey === 'base') {
      baseResultJson = { sigCount, total, wr, wrPct, ev };
    } else if (baseResultJson) {
      const dSig = sigCount - baseResultJson.sigCount;
      const dWR  = total > 0 && baseResultJson.total > 0
        ? ((wr - baseResultJson.wr) * 100).toFixed(1)
        : '--';
      const dEV  = ev != null && baseResultJson.ev != null
        ? (ev - baseResultJson.ev).toFixed(3)
        : '--';
      log(`\n— 与基准对比 —`);
      log(`信号数：${dSig >= 0 ? '+' : ''}${dSig}  胜率：${dWR >= 0 ? '+' : ''}${dWR}%  期望值：${dEV >= 0 ? '+' : ''}${dEV}R`);
    }

    if (sigCount === 0) {
      log(`\n⚠ 零信号——可能原因：OKX API 访问失败，请检查网络连接，或回溯天数太短。`);
      log(`  建议：检查网络连接后重试，或增加回溯天数。`);
    } else {
      document.getElementById('json-out').value = JSON.stringify(resultJson, null, 2);
      document.getElementById('output-area').style.display = 'block';
    }

  } catch (e) {
    log(`\n❌ 错误：${e.message}`);
    log(`提示：OKX API 访问失败，请检查网络连接后重试。`);
  }
}

function injectToStorage() {
  if (!resultJson.length) { alert('没有数据可写入'); return; }
  const existing = (() => {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
  })();
  // 合并去重（按 ts 去重）
  const merged = [...existing, ...resultJson]
    .sort((a, b) => a.ts - b.ts)
    .filter((v, i, arr) => i === 0 || arr[i-1].ts !== v.ts)
    .slice(-200);  // 最多保留200条（与主面板一致）
  localStorage.setItem(HISTORY_KEY, JSON.stringify(merged));
  alert(`✓ 已写入 localStorage：${merged.length} 条记录（含原有 ${existing.length} 条）`);
}

function copyJson() {
  navigator.clipboard.writeText(document.getElementById('json-out').value)
    .then(() => {
      const tip = document.getElementById('copy-tip');
      tip.style.display = 'inline';
      setTimeout(() => { tip.style.display = 'none'; }, 2000);
    });
}

function clearLog() {
  document.getElementById('log').textContent = '';
}

function log(msg) {
  const el = document.getElementById('log');
  el.textContent += msg + '\n';
  el.scrollTop = el.scrollHeight;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
